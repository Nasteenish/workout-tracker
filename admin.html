<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ-панель</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 16px; padding-bottom: 100px; }
h1 { text-align: center; margin: 16px 0; font-size: 24px; }
.stats { text-align: center; margin-bottom: 12px; color: #888; font-size: 14px; }

.tabs { display: flex; justify-content: center; gap: 0; margin-bottom: 16px; }
.tab { padding: 10px 20px; border: 1px solid #333; background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
.tab:first-child { border-radius: 10px 0 0 10px; }
.tab:last-child { border-radius: 0 10px 10px 0; }
.tab.active { background: #4a9eff; color: #fff; border-color: #4a9eff; }

.filters { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; position: sticky; top: 0; background: #0a0a0a; padding: 12px 0; z-index: 10; }
.filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 13px; transition: all 0.2s; }
.filter-btn.active { background: #4a9eff; color: #fff; border-color: #4a9eff; }
.filter-btn:hover { border-color: #4a9eff; }

.search { width: 100%; max-width: 400px; padding: 10px 16px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; font-size: 14px; margin: 0 auto 20px; display: block; }
.search:focus { outline: none; border-color: #4a9eff; }

/* List items (for gyms) */
.list { max-width: 600px; margin: 0 auto; }
.list-item { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; border: 1px solid #222; border-radius: 12px; padding: 16px; margin-bottom: 8px; transition: border-color 0.2s; }
.list-item:hover { border-color: #333; }
.list-item-info { flex: 1; min-width: 0; }
.list-item-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
.list-item-meta { font-size: 13px; color: #888; }
.list-item-actions { display: flex; gap: 8px; margin-left: 12px; flex-shrink: 0; }

/* Grid (for equipment/exercises) */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: transform 0.2s, border-color 0.2s; cursor: pointer; position: relative; }
.card:hover { transform: translateY(-2px); border-color: #444; }
.card-img { width: 100%; height: 180px; object-fit: contain; background: #fff; padding: 8px; }
.card-img.no-img { display: flex; align-items: center; justify-content: center; background: #222; color: #555; font-size: 40px; }
.card-body { padding: 12px; }
.card-brand { font-size: 11px; color: #4a9eff; text-transform: uppercase; letter-spacing: 1px; }
.card-name { font-size: 14px; font-weight: 600; margin: 4px 0; }
.card-name-secondary { font-size: 12px; color: #999; margin-bottom: 4px; }
.card-model { font-size: 12px; color: #888; }
.card-meta { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #252525; color: #aaa; }
.tag.muscle { background: #1a2a1a; color: #6c6; }
.tag.type { background: #1a1a2a; color: #88f; }
.tag.cat { background: #2a1a1a; color: #c88; }
.tag.level { background: #2a2a1a; color: #cc8; }

.card-imgs { display: flex; gap: 2px; background: #fff; height: 180px; }
.card-imgs img { flex: 1; height: 100%; object-fit: contain; padding: 4px; }

.card-delete { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; border: none; background: rgba(220, 50, 50, 0.85); color: #fff; font-size: 16px; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 5; line-height: 1; }
.card:hover .card-delete { display: flex; }
.card-delete:hover { background: #e03030; }

/* Buttons */
.btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: #4a9eff; color: #fff; }
.btn-primary:hover { background: #3a8eef; }
.btn-danger { background: #dc3545; color: #fff; }
.btn-danger:hover { background: #c82333; }
.btn-secondary { background: #333; color: #ccc; }
.btn-secondary:hover { background: #444; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* FAB */
.fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; border: none; background: #4a9eff; color: #fff; font-size: 28px; cursor: pointer; box-shadow: 0 4px 16px rgba(74,158,255,0.4); display: flex; align-items: center; justify-content: center; z-index: 50; transition: all 0.2s; }
.fab:hover { transform: scale(1.1); background: #3a8eef; }

/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; padding: 16px; }
.modal-overlay.open { display: flex; }
.modal { background: #1a1a1a; border-radius: 16px; border: 1px solid #333; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #252525; }
.modal-header h2 { font-size: 18px; font-weight: 700; }
.modal-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: #333; color: #ccc; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: #444; }
.modal-body { padding: 20px; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; font-weight: 500; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid #333; background: #0a0a0a; color: #e0e0e0; font-size: 14px; font-family: inherit; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #4a9eff; }
.form-group textarea { min-height: 80px; resize: vertical; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* Empty state */
.empty { text-align: center; color: #555; font-size: 16px; margin-top: 60px; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }

/* Confirm dialog */
.confirm-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 200; justify-content: center; align-items: center; padding: 16px; }
.confirm-overlay.open { display: flex; }
.confirm-box { background: #1a1a1a; border-radius: 16px; border: 1px solid #333; padding: 24px; max-width: 400px; width: 100%; text-align: center; }
.confirm-box p { font-size: 16px; margin-bottom: 20px; line-height: 1.5; }
.confirm-actions { display: flex; gap: 8px; justify-content: center; }

/* Toast */
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 14px; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* Equipment exercise count */
.card-ex-count { font-size: 11px; color: #4a9eff; margin-top: 6px; }

/* Detail overlay */
.det-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0a0a0a; z-index: 80; overflow-y: auto; -webkit-overflow-scrolling: touch; transform: translateX(100%); transition: transform 0.3s; }
.det-overlay.visible { transform: translateX(0); }
.det-topbar { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #222; position: sticky; top: 0; background: #0a0a0a; z-index: 5; }
.det-topbar-back { background: none; border: none; color: #4a9eff; font-size: 16px; cursor: pointer; padding: 4px 8px; margin-right: 8px; }
.det-topbar-title { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.det-header { display: flex; gap: 16px; padding: 16px; }
.det-header-img { width: 120px; height: 120px; object-fit: contain; background: #fff; border-radius: 12px; padding: 8px; flex-shrink: 0; }
.det-header-img.no-img { display: flex; align-items: center; justify-content: center; background: #222; color: #555; font-size: 40px; }
.det-header-info { flex: 1; min-width: 0; }
.det-brand { font-size: 11px; color: #4a9eff; text-transform: uppercase; letter-spacing: 1px; }
.det-name { font-size: 18px; font-weight: 700; margin: 4px 0; }
.det-model { font-size: 13px; color: #888; }
.det-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.det-section-title { font-size: 14px; font-weight: 600; color: #aaa; padding: 12px 16px 8px; text-transform: uppercase; letter-spacing: 1px; }
.det-linked { padding: 0 16px; }
.linked-ex-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
.linked-ex-name { flex: 1; min-width: 0; }
.linked-ex-name div:first-child { font-size: 14px; font-weight: 500; }
.linked-ex-name-en { font-size: 12px; color: #666; }
.linked-ex-remove { background: none; border: none; color: #c55; font-size: 20px; cursor: pointer; padding: 4px 8px; }
.linked-ex-empty { color: #555; font-size: 14px; padding: 8px 0; }
.det-search-wrap { padding: 12px 16px; display: flex; gap: 8px; align-items: center; }
.det-search { flex: 1; padding: 8px 14px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; font-size: 14px; }
.det-search:focus { outline: none; border-color: #4a9eff; }
.det-show-all-label { font-size: 12px; color: #888; white-space: nowrap; display: flex; align-items: center; gap: 4px; cursor: pointer; }
.det-search-results { padding: 0 16px; display: none; }
.muscle-group { border-bottom: 1px solid #1a1a1a; }
.muscle-group-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; cursor: pointer; }
.muscle-group-label { font-size: 14px; font-weight: 600; }
.muscle-group-count { font-size: 12px; color: #666; margin-right: 6px; }
.muscle-group-arrow { font-size: 10px; color: #666; transition: transform 0.2s; display: inline-block; }
.muscle-group.open .muscle-group-arrow { transform: rotate(90deg); }
.muscle-group-exercises { display: none; padding: 0 16px 8px; }
.muscle-group.open .muscle-group-exercises { display: block; }
.ex-option { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #111; cursor: pointer; }
.ex-option:hover { background: #151515; }
.ex-option.linked { background: #0a1a0a; }
.ex-option-name { flex: 1; min-width: 0; }
.ex-option-name-ru { font-size: 14px; }
.ex-option-name-en { font-size: 11px; color: #666; }
.ex-option-check { font-size: 16px; color: #4a9eff; width: 24px; text-align: center; flex-shrink: 0; }

/* Exercise type editor */
.et-section { padding: 0 16px 8px; }
.et-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.et-tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 14px; background: #1a2a1a; color: #6c6; font-size: 12px; font-family: monospace; }
.et-tag-remove { cursor: pointer; color: #f66; font-size: 14px; margin-left: 2px; line-height: 1; }
.et-tag-remove:hover { color: #f00; }
.et-add { display: flex; gap: 6px; }
.et-select { flex: 1; padding: 6px 10px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; font-size: 13px; }
.et-select:focus { outline: none; border-color: #4a9eff; }
.et-add-btn { padding: 6px 14px; border-radius: 10px; border: none; background: #4a9eff; color: #fff; font-size: 13px; cursor: pointer; white-space: nowrap; }
.et-add-btn:hover { background: #3a8eef; }
.et-matched-item { padding: 3px 0; font-size: 13px; color: #aaa; border-bottom: 1px solid #151515; }

/* Exercise Detail overlay */
.exdet-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0a0a0a; z-index: 80; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s; -webkit-overflow-scrolling: touch; }
.exdet-overlay.visible { transform: translateX(0); }
.exdet-topbar { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #222; position: sticky; top: 0; background: #0a0a0a; z-index: 5; }
.exdet-topbar-back { background: none; border: none; color: #4a9eff; font-size: 16px; cursor: pointer; padding: 4px 8px; margin-right: 8px; }

.exdet-images { display: flex; gap: 2px; background: #fff; width: 100%; }
.exdet-images img { flex: 1; min-width: 0; max-height: 280px; object-fit: contain; padding: 8px; }
.exdet-images.single img { max-width: 100%; }
.exdet-no-img { width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; background: #222; color: #555; font-size: 60px; }
.exdet-body { padding: 16px; }
.exdet-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.exdet-name-en { font-size: 14px; color: #888; margin-bottom: 12px; }
.exdet-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.exdet-section { margin-top: 20px; }
.exdet-section-title { font-size: 13px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.exdet-muscles { display: flex; flex-direction: column; gap: 4px; }
.exdet-muscle-row { display: flex; align-items: center; gap: 8px; }
.exdet-muscle-label { font-size: 12px; color: #666; width: 80px; flex-shrink: 0; }
.exdet-muscle-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.exdet-instructions { list-style: decimal; padding-left: 20px; font-size: 14px; line-height: 1.6; color: #ccc; }
.exdet-instructions li { margin-bottom: 6px; }
.exdet-equipment-list { display: flex; flex-direction: column; gap: 6px; }
.exdet-eq-item { display: flex; align-items: center; gap: 10px; padding: 8px; background: #1a1a1a; border-radius: 10px; border: 1px solid #222; }
.exdet-eq-img { width: 50px; height: 50px; object-fit: contain; background: #fff; border-radius: 8px; padding: 4px; flex-shrink: 0; }
.exdet-eq-img.no-img { display: flex; align-items: center; justify-content: center; background: #222; color: #555; font-size: 20px; }
.exdet-eq-info { flex: 1; min-width: 0; }
.exdet-eq-brand { font-size: 10px; color: #4a9eff; text-transform: uppercase; letter-spacing: 0.5px; }
.exdet-eq-name { font-size: 13px; font-weight: 500; }

/* Mobile fixes */
@media (hover: none) {
  .card-delete { display: flex; opacity: 0.7; }
}
@media (max-width: 480px) {
  .det-header { flex-direction: column; align-items: center; text-align: center; }
  .det-header-img { width: 100px; height: 100px; }
  .det-tags { justify-content: center; }
}
</style>
</head>

<h1>Админ-панель</h1>
<div class="stats" id="stats"></div>

<div class="tabs">
  <div class="tab active" data-tab="gyms">Залы</div>
  <div class="tab" data-tab="equipment">Тренажёры</div>
  <div class="tab" data-tab="exercises">Упражнения</div>
</div>

<div class="filters" id="filters"></div>

<input type="text" class="search" id="search" placeholder="Поиск..." style="display:none">

<div id="content"></div>

<button class="fab" id="fab" title="Добавить">+</button>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Добавить</h2>
      <button class="modal-close" id="modal-close">&times;</button>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Equipment Detail Panel -->
<div class="det-overlay" id="det-overlay">
  <div class="det-topbar">
    <button class="det-topbar-back" id="det-back">← Назад</button>
    <div class="det-topbar-title" id="det-topbar-title"></div>
  </div>
  <div id="det-header"></div>
  <div class="det-section-title">Привязка к упражнениям (exercise_type)</div>
  <div class="et-section" id="et-section"></div>
  <div class="det-linked" id="det-linked" style="display:none"></div>
  <div class="det-search-results" id="det-search-results" style="display:none"></div>

<div class="exdet-overlay" id="exdet-overlay">

    <div class="exdet-topbar-title" id="exdet-topbar-title"></div>

  <div id="exdet-content"></div>
</div>

  'preacher curl': 'preacher_curl', 'scott curl': 'preacher_curl',
  'triceps extension': 'tricep_extension', 'triceps pushdown': 'tricep_extension',
  'triceps pressdown': 'tricep_extension', 'triceps kickback': 'tricep_extension',
  'triceps rope pushdown': 'tricep_extension', 'skull crusher': 'tricep_extension',
  'triceps dip': 'tricep_dip', 'seated dip machine': 'chest_dip',
  'crunch': 'crunch', 'sit up': 'crunch',
  'torso rotation': 'torso_rotation', 'cable twist': 'torso_rotation',
  'cable core palloff press': 'cable_multi', 'cable pull through': 'cable_multi',
  'ab swing': 'crunch', 'hanging knee raise': 'crunch', 'leg raise': 'crunch',
  'smith_machine': 'smith_machine', 'lunge': 'lunge',
};
const _reverseTypeMap = {};
for (const [name, type] of Object.entries(_exerciseTypeMap)) {
  if (!_reverseTypeMap[type]) _reverseTypeMap[type] = [];
  _reverseTypeMap[type].push(name);
}
const ALL_EXERCISE_TYPES = Object.keys(_reverseTypeMap).sort();

function getMatchingExercises(exerciseTypeStr) {
  if (!exerciseTypeStr) return [];
  const types = exerciseTypeStr.split(',').map(t => t.trim()).filter(Boolean);
  const names = new Set();
  types.forEach(type => {
    const m = _reverseTypeMap[type];
    if (m) m.forEach(n => names.add(n));
  });
  return [...names].sort();
}

function renderExerciseTypeEditor() {
  if (!detEquipment) return;
  const el = document.getElementById('et-section');
  const currentTypes = (detEquipment.exercise_type || '').split(',').map(t => t.trim()).filter(Boolean);
  const availableTypes = ALL_EXERCISE_TYPES.filter(t => !currentTypes.includes(t));

  const tagsHtml = currentTypes.length
    ? currentTypes.map(t => `<span class="et-tag">${t}<span class="et-tag-remove" data-et-remove="${t}">&times;</span></span>`).join('')
    : '<span style="color:#555;font-size:13px">Нет типов — тренажёр не привяжется к упражнениям</span>';

  const matched = getMatchingExercises(detEquipment.exercise_type);
  const matchedHtml = matched.length
    ? matched.map(n => `<div class="et-matched-item">${n}</div>`).join('')
    : '';

  el.innerHTML = `
    <div class="et-tags">${tagsHtml}</div>
    <div class="et-add">
      <select class="et-select" id="et-select">
        <option value="">+ Добавить тип...</option>
        ${availableTypes.map(t => {
          const examples = (_reverseTypeMap[t] || []).slice(0, 2).join(', ');
          return `<option value="${t}">${t} (${examples})</option>`;
        }).join('')}
      </select>
      <button class="et-add-btn" id="et-add-btn">Добавить</button>
    </div>
    ${matchedHtml ? '<div style="margin-top:8px;color:#888;font-size:11px;text-transform:uppercase;letter-spacing:1px">Привязанные упражнения:</div>' + matchedHtml : ''}
  `;
}

// ===== TOAST =====
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;

// ===== CONFIRM =====
let confirmCallback = null;
function showConfirm(text, cb) {
  document.getElementById('confirm-text').textContent = text;
  document.getElementById('confirm').classList.add('open');
  confirmCallback = cb;
}
document.getElementById('confirm-ok').onclick = () => {
  document.getElementById('confirm').classList.remove('open');
  if (confirmCallback) confirmCallback();
  confirmCallback = null;
};
document.getElementById('confirm-cancel').onclick = () => {
  document.getElementById('confirm').classList.remove('open');
  confirmCallback = null;
};

  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') closeModal();
});

// ===== ESCAPE KEY =====

function renderFilters() {
  const filtersEl = document.getElementById('filters');
  const searchEl = document.getElementById('search');

  if (currentTab === 'gyms') {
    filtersEl.innerHTML = '';
    searchEl.style.display = 'none';
    return;
  }

  searchEl.style.display = 'block';

  let filters;
  if (currentTab === 'equipment') {
    const brands = [...new Set(equipmentData.map(i => i.brand))].sort();
    filters = [{ key: 'all', label: 'Все' }, ...brands.map(b => ({ key: b, label: b }))];
  } else {
    const muscles = [...new Set(exerciseData.flatMap(e => e.primary_muscles || []))].sort();
    filters = [{ key: 'all', label: 'Все' }, ...muscles.map(m => ({ key: m, label: MUSCLE_RU[m] || m }))];
  }

  filtersEl.innerHTML = filters.map(f =>
    '<button class="filter-btn' + (currentFilter === f.key ? ' active' : '') + '" data-filter="' + f.key + '">' + f.label + '</button>'
  ).join('');
}

function render() {
  const query = document.getElementById('search').value.toLowerCase();
  const content = document.getElementById('content');
  const statsEl = document.getElementById('stats');

  if (currentTab === 'gyms') {
    renderGyms(content, statsEl);
  } else if (currentTab === 'equipment') {
    renderEquipmentGrid(content, statsEl, query);
  } else {
    renderExerciseGrid(content, statsEl, query);
  }
}

function renderGyms(container, statsEl) {

function renderEquipmentGrid(container, statsEl, query) {
  const filtered = equipmentData.filter(item => {
    if (currentFilter !== 'all' && item.brand !== currentFilter) return false;
    if (query && !item.name.toLowerCase().includes(query) && !(item.model || '').toLowerCase().includes(query) && !(item.brand || '').toLowerCase().includes(query)) return false;
    return true;
  });
  statsEl.textContent = 'Тренажёры: ' + filtered.length + ' / ' + equipmentData.length;

  if (!filtered.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🏋️</div>Тренажёры не найдены</div>';
    return;
  }

  container.innerHTML = '<div class="grid">' + filtered.map(item => `
    <div class="card" data-eq-id="${item.id}">
      <button class="card-delete" data-delete-eq="${item.id}" title="Удалить">&times;</button>
      ${item.image_url
        ? '<img class="card-img" src="' + esc(item.image_url) + '" loading="lazy">'
        : '<div class="card-img no-img">🏋️</div>'}

        <div class="card-name">${esc(item.name)}</div>
        <div class="card-model">${esc(item.model || '—')}</div>
        <div class="card-meta">

          <span class="tag type">${esc(item.equipment_type || '—')}</span>
        </div>
        ${linkCounts[item.id] ? '<div class="card-ex-count">▶ ' + linkCounts[item.id] + ' упр.</div>' : ''}
      </div>
    </div>
  `).join('') + '</div>';
}

function renderExerciseCard(item) {
  const imgs = item.images || [];
  let imgHtml;
  if (imgs.length >= 2) {
    imgHtml = '<div class="card-imgs"><img src="' + esc(imgs[0]) + '" loading="lazy"><img src="' + esc(imgs[1]) + '" loading="lazy"></div>';
  } else if (imgs.length === 1) {
    imgHtml = '<img class="card-img" src="' + esc(imgs[0]) + '" loading="lazy">';
  } else {
    imgHtml = '<div class="card-img no-img">💪</div>';
  }
  return `
    <div class="card" data-ex-id="${esc(item.id)}">
      <button class="card-delete" data-delete-ex="${esc(item.id)}" title="Удалить">&times;</button>
      ${imgHtml}
      <div class="card-body">
        <div class="card-name">${esc(item.name_ru || item.name_en)}</div>
        <div class="card-name-secondary">${esc(item.name_en)}</div>
        <div class="card-meta">
          ${(item.primary_muscles || []).map(m => '<span class="tag muscle">' + esc(MUSCLE_RU[m] || m) + '</span>').join('')}
          ${item.equipment ? '<span class="tag type">' + esc(item.equipment) + '</span>' : ''}
          ${item.level ? '<span class="tag level">' + esc(item.level) + '</span>' : ''}
        </div>
      </div>
    </div>
  `;
}

function renderExerciseGrid(container, statsEl, query) {
  const filtered = exerciseData.filter(item => {
    if (currentFilter !== 'all' && !(item.primary_muscles || []).includes(currentFilter)) return false;
    if (query) {
      const match = (item.name_ru || '').toLowerCase().includes(query) ||
                    (item.name_en || '').toLowerCase().includes(query) ||
                    (item.equipment || '').toLowerCase().includes(query);
      if (!match) return false;
    }
    return true;
  });
  statsEl.textContent = 'Упражнения: ' + filtered.length + ' / ' + exerciseData.length;

  if (!filtered.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">💪</div>Упражнения не найдены</div>';
    return;
  }

  // Если активен конкретный фильтр или идёт поиск — плоская сетка
  if (currentFilter !== 'all' || query) {
    container.innerHTML = '<div class="grid">' + filtered.map(renderExerciseCard).join('') + '</div>';
    return;
  }

  // Иначе — группировка по мышцам
  const MUSCLE_ORDER = [
    'chest','shoulders','triceps','biceps','forearms',
    'lats','upper_back','lower_back','traps',
    'abdominals','quadriceps','hamstrings','glutes','calves',
    'abductors','adductors','neck','cardio'
  ];

  const byMuscle = {};
  const noMuscle = [];
  for (const item of filtered) {
    const cat = (item.primary_muscles && item.primary_muscles[0]) || null;
    if (cat) {
      if (!byMuscle[cat]) byMuscle[cat] = [];
      byMuscle[cat].push(item);
    } else {
      noMuscle.push(item);
    }
  }

  const allMuscles = [...MUSCLE_ORDER.filter(m => byMuscle[m]),
    ...Object.keys(byMuscle).filter(m => !MUSCLE_ORDER.includes(m)).sort()];

  let html = '';
  for (const muscle of allMuscles) {
    const list = byMuscle[muscle];
    html += `<div style="margin-bottom:32px">
      <h2 style="font-size:16px;font-weight:700;color:#4a9eff;margin-bottom:12px;padding:0 2px">
        ${esc(MUSCLE_RU[muscle] || muscle)} <span style="color:#555;font-weight:400;font-size:13px">(${list.length})</span>
      </h2>
      <div class="grid">${list.map(renderExerciseCard).join('')}</div>
    </div>`;
  }
  if (noMuscle.length) {
    html += `<div style="margin-bottom:32px">
      <h2 style="font-size:16px;font-weight:700;color:#666;margin-bottom:12px;padding:0 2px">
        Без категории <span style="color:#555;font-weight:400;font-size:13px">(${noMuscle.length})</span>
      </h2>
      <div class="grid">${noMuscle.map(renderExerciseCard).join('')}</div>
    </div>`;
  }
  container.innerHTML = html;
}

      <label>Оборудование</label>

        <option value="dumbbell">Гантели (dumbbell)</option>
        <option value="cable">Кабель (cable)</option>
        <option value="bodyweight">Своё тело (bodyweight)</option>
        <option value="kettlebell">Гиря (kettlebell)</option>
        <option value="resistance band">Резинка (band)</option>
        <option value="plate">Блин (plate)</option>
        <option value="other">Другое</option>
      </select>
    </div>
    <div class="form-group">
      <label>Категория</label>
      <input type="text" id="f-ex-category" placeholder="strength, stretching, cardio...">
    </div>
    <div class="form-group">
      <label>Уровень</label>
      <select id="f-ex-level">
        <option value="">—</option>
        <option value="beginner">Начинающий</option>
        <option value="intermediate">Средний</option>
        <option value="expert">Продвинутый</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" id="f-ex-save">Сохранить</button>
    </div>
  `);
  document.getElementById('f-ex-name-ru').focus();
  document.getElementById('f-ex-save').onclick = async () => {
    const nameRu = document.getElementById('f-ex-name-ru').value.trim();
    if (!nameRu) return toast('Введите название');
    const muscles = document.getElementById('f-ex-muscles').value.trim()
      .split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
    try {
      await addExercise({
        id: 'custom_' + Date.now(),
        name_ru: nameRu,
        name_en: document.getElementById('f-ex-name-en').value.trim() || null,
        primary_muscles: muscles.length ? muscles : null,
        equipment: document.getElementById('f-ex-equipment').value || null,
        category: document.getElementById('f-ex-category').value.trim() || null,
        level: document.getElementById('f-ex-level').value || null,
      });
      closeModal();
      await loadExercises();
      render();
      toast('Упражнение добавлено');
    } catch (e) { toast('Ошибка: ' + e.message); }
  };
}

// ===== EQUIPMENT DETAIL PANEL =====

function openEquipmentDetail(equipmentId) {
  const eq = equipmentData.find(e => e.id === equipmentId);
  if (!eq) return;
  detEquipment = eq;
  detLinkedIds = new Set();

  document.getElementById('det-topbar-title').textContent = eq.name;
  document.getElementById('det-header').innerHTML = `
    ${eq.image_url
      ? '<img class="det-header-img" src="' + esc(eq.image_url) + '">'
      : '<div class="det-header-img no-img">🏋️</div>'}
    <div class="det-header-info">
      <div class="det-brand">${esc(eq.brand)}</div>
      <div class="det-name">${esc(eq.name)}</div>
      <div class="det-model">${eq.model ? 'Модель: ' + esc(eq.model) : ''}</div>
      <div class="det-tags">
        ${eq.muscle_group ? '<span class="tag muscle">' + esc(eq.muscle_group) + '</span>' : ''}
        ${eq.equipment_type ? '<span class="tag type">' + esc(eq.equipment_type) + '</span>' : ''}
      </div>
    </div>
  `;

  const overlay = document.getElementById('det-overlay');
  overlay.classList.add('visible');
  overlay.scrollTop = 0;
  document.body.style.overflow = 'hidden';

  showAllExercises = false;
  document.getElementById('det-show-all').checked = false;
  document.getElementById('det-search').value = '';
  document.getElementById('det-search-results').style.display = 'none';

  renderExerciseTypeEditor();
  loadAndRenderLinked(equipmentId);
  renderMuscleGroups();
}

function closeEquipmentDetail() {
  document.getElementById('det-overlay').classList.remove('visible');
  document.body.style.overflow = '';
  detEquipment = null;
  // Refresh main grid to update link counts
  render();
}

async function loadAndRenderLinked(equipmentId) {
  document.getElementById('det-linked').innerHTML = '<div class="linked-ex-empty">Загрузка...</div>';
  const ids = await loadLinkedExercises(equipmentId);
  detLinkedIds = new Set(ids);
  renderLinked();
  renderMuscleGroups();
}

function renderLinked() {
  const container = document.getElementById('det-linked');
  if (detLinkedIds.size === 0) {
    container.innerHTML = '<div class="linked-ex-empty">Нет привязанных упражнений</div>';
    return;
  }
  const items = [];
  detLinkedIds.forEach(id => {
    const ex = exerciseData.find(e => e.id === id);
    if (!ex) return;
    items.push(`
      <div class="linked-ex-item">
        <div class="linked-ex-name">
          <div>${ex.name_ru || ex.name_en}</div>
          <div class="linked-ex-name-en">${ex.name_en}</div>
        </div>
        <button class="linked-ex-remove" data-unlink-ex="${esc(id)}" title="Убрать привязку">×</button>
      </div>
    `);
  });
  container.innerHTML = items.join('');
}

function renderMuscleGroups() {
  const groups = {};
  getFilteredExercises().forEach(ex => {
    const muscle = (ex.primary_muscles && ex.primary_muscles[0]) || 'other';
    if (!groups[muscle]) groups[muscle] = [];
    groups[muscle].push(ex);
  });

  const sortedMuscles = Object.keys(groups).sort((a, b) => {
    return (MUSCLE_RU[a] || a).localeCompare(MUSCLE_RU[b] || b, 'ru');
  });

  document.getElementById('det-muscle-groups').innerHTML = sortedMuscles.map(muscle => {
    const exercises = groups[muscle];
    if (!exercises.length) return '';
    const label = MUSCLE_RU[muscle] || muscle;
    const exHtml = exercises.map(ex => {
      const linked = detLinkedIds.has(ex.id);
      return `
        <div class="ex-option ${linked ? 'linked' : ''}" data-toggle-ex="${esc(ex.id)}">
          <div class="ex-option-name">
            <div class="ex-option-name-ru">${ex.name_ru || ex.name_en}</div>
            <div class="ex-option-name-en">${ex.name_en}</div>
          </div>
          <div class="ex-option-check">${linked ? '✓' : ''}</div>
        </div>
      `;
    }).join('');
    return `
      <div class="muscle-group" data-muscle="${muscle}">
        <div class="muscle-group-header">
          <span class="muscle-group-label">${label}</span>
          <span>
            <span class="muscle-group-count">${exercises.length}</span>
            <span class="muscle-group-arrow">▶</span>
          </span>
        </div>
        <div class="muscle-group-exercises">${exHtml}</div>
      </div>
    `;
  }).join('');
}

function renderDetSearchResults(query) {
  const resultsEl = document.getElementById('det-search-results');
  if (!query.trim()) { resultsEl.style.display = 'none'; return; }
  const q = query.toLowerCase();
  const matches = getFilteredExercises().filter(ex =>
    (ex.name_ru || '').toLowerCase().includes(q) || (ex.name_en || '').toLowerCase().includes(q)
  ).slice(0, 30);

  if (!matches.length) {
    resultsEl.style.display = 'block';
    resultsEl.innerHTML = '<div style="color:#555;font-size:14px;padding:8px">Не найдено</div>';
    return;
  }
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = matches.map(ex => {
    const linked = detLinkedIds.has(ex.id);
    return `
      <div class="ex-option ${linked ? 'linked' : ''}" data-toggle-ex="${esc(ex.id)}">
        <div class="ex-option-name">
          <div class="ex-option-name-ru">${ex.name_ru || ex.name_en}</div>
          <div class="ex-option-name-en">${ex.name_en}</div>
        </div>
        <div class="ex-option-check">${linked ? '✓' : ''}</div>
      </div>
    `;
  }).join('');
}

async function toggleExerciseLink(exerciseId) {
  if (!detEquipment) return;
  const eqId = detEquipment.id;
  if (detLinkedIds.has(exerciseId)) {
    await unlinkExercise(eqId, exerciseId);
    detLinkedIds.delete(exerciseId);
    linkCounts[eqId] = Math.max(0, (linkCounts[eqId] || 1) - 1);
    if (!linkCounts[eqId]) delete linkCounts[eqId];
  } else {
    await linkExercise(eqId, exerciseId);
    detLinkedIds.add(exerciseId);
    linkCounts[eqId] = (linkCounts[eqId] || 0) + 1;
  }
  renderLinked();
  const q = document.getElementById('det-search').value;
  if (q.trim()) renderDetSearchResults(q);
  else renderMuscleGroups();
}

// ===== EXERCISE DETAIL PANEL =====

async function openExerciseDetail(exerciseId) {
  const ex = exerciseData.find(e => e.id === exerciseId);
  if (!ex) return;

  document.getElementById('exdet-topbar-title').textContent = ex.name_ru || ex.name_en;

  // Images
  const imgs = ex.images || [];
  let imgHtml;
  if (imgs.length >= 2) {
    imgHtml = '<div class="exdet-images"><img src="' + esc(imgs[0]) + '"><img src="' + esc(imgs[1]) + '"></div>';
  } else if (imgs.length === 1) {
    imgHtml = '<div class="exdet-images single"><img src="' + esc(imgs[0]) + '"></div>';
  } else {
    imgHtml = '<div class="exdet-no-img">💪</div>';
  }

  // Muscles
  const primary = (ex.primary_muscles || []).map(m => '<span class="tag muscle">' + esc(MUSCLE_RU[m] || m) + '</span>').join('');
  const secondary = (ex.secondary_muscles || []).map(m => '<span class="tag muscle" style="background:#1a1a2a;color:#88a">' + esc(MUSCLE_RU[m] || m) + '</span>').join('');

  // Instructions
  const instr = ex.instructions || [];
  let instrHtml = '';
  if (instr.length) {
    instrHtml = `
      <div class="exdet-section">
        <div class="exdet-section-title">Инструкция</div>
        <ol class="exdet-instructions">${instr.map(s => '<li>' + esc(s) + '</li>').join('')}</ol>
      </div>
    `;
  }

  // Linked equipment
  let eqHtml = '';
  try {
    const r = await fetch(SB + '/rest/v1/equipment_exercises?exercise_id=eq.' + encodeURIComponent(exerciseId) + '&select=equipment_id', { headers: H });
    if (r.ok) {
      const rows = await r.json();
      const eqIds = rows.map(row => row.equipment_id);
      const linkedEq = eqIds.map(id => equipmentData.find(e => e.id === id)).filter(Boolean);
      if (linkedEq.length) {
        eqHtml = `
          <div class="exdet-section">
            <div class="exdet-section-title">На каких тренажёрах</div>
            <div class="exdet-equipment-list">
              ${linkedEq.map(eq => `
                <div class="exdet-eq-item" data-goto-eq="${eq.id}">
                  ${eq.image_url
                    ? '<img class="exdet-eq-img" src="' + esc(eq.image_url) + '">'
                    : '<div class="exdet-eq-img no-img">🏋️</div>'}
                  <div class="exdet-eq-info">
                    <div class="exdet-eq-brand">${esc(eq.brand)}</div>
                    <div class="exdet-eq-name">${esc(eq.name)}</div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }
    }
  } catch(e) {}

  document.getElementById('exdet-content').innerHTML = `
    ${imgHtml}
    <div class="exdet-body">
      <div class="exdet-name">${esc(ex.name_ru || ex.name_en)}</div>
      <div class="exdet-name-en">${esc(ex.name_en || '')}</div>
      <div class="exdet-tags">
        ${ex.equipment ? '<span class="tag type">' + esc(ex.equipment) + '</span>' : ''}
        ${ex.category ? '<span class="tag cat">' + esc(ex.category) + '</span>' : ''}
        ${ex.level ? '<span class="tag level">' + esc(ex.level) + '</span>' : ''}
        ${ex.force ? '<span class="tag">' + esc(ex.force) + '</span>' : ''}
        ${ex.mechanic ? '<span class="tag">' + esc(ex.mechanic) + '</span>' : ''}
      </div>
      ${primary || secondary ? `
        <div class="exdet-section">
          <div class="exdet-section-title">Мышцы</div>
          <div class="exdet-muscles">
            ${primary ? '<div class="exdet-muscle-row"><span class="exdet-muscle-label">Основные:</span><div class="exdet-muscle-tags">' + primary + '</div></div>' : ''}
            ${secondary ? '<div class="exdet-muscle-row"><span class="exdet-muscle-label">Вторичные:</span><div class="exdet-muscle-tags">' + secondary + '</div></div>' : ''}
          </div>
        </div>
      ` : ''}
      ${instrHtml}
      ${eqHtml}
    </div>
  `;

  const overlay = document.getElementById('exdet-overlay');
  overlay.classList.add('visible');
  overlay.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeExerciseDetail() {
  document.getElementById('exdet-overlay').classList.remove('visible');
  document.body.style.overflow = '';
}

// ===== EVENT LISTENERS =====

// Tabs
document.querySelector('.tabs').addEventListener('click', e => {
  if (!e.target.matches('.tab')) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  currentTab = e.target.dataset.tab;
  currentFilter = 'all';
  document.getElementById('search').value = '';
  renderFilters();
  render();
});

// Filters
document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.matches('.filter-btn')) return;
  document.getElementById('filters').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.filter;
  render();
});

// Search
document.getElementById('search').addEventListener('input', render);

// FAB
document.getElementById('fab').addEventListener('click', () => {
  if (currentTab === 'gyms') showAddGymForm();
  else if (currentTab === 'equipment') showAddEquipmentForm();
  else showAddExerciseForm();
});

// Content clicks (delete, rename)
document.getElementById('content').addEventListener('click', e => {
  // Gym delete
  const gymDel = e.target.closest('.gym-delete');
  if (gymDel) {
    const id = gymDel.dataset.id;
    const gym = gymsData.find(g => g.id === id);
    showConfirm('Удалить зал «' + (gym ? gym.name : id) + '»?', async () => {
      await deleteGymFromDb(id);
      await loadGyms();
      render();
      toast('Зал удалён');
    });
    return;
  }

  // Gym rename
  const gymRen = e.target.closest('.gym-rename');
  if (gymRen) {
    const id = gymRen.dataset.id;
    const gym = gymsData.find(g => g.id === id);
    openModal('Переименовать зал', `
      <div class="form-group">
        <label>Новое название</label>
        <input type="text" id="f-rename" value="${esc(gym ? gym.name : '')}">
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
        <button class="btn btn-primary" id="f-rename-save">Сохранить</button>
      </div>
    `);
    document.getElementById('f-rename').focus();
    document.getElementById('f-rename').select();
    document.getElementById('f-rename-save').onclick = async () => {
      const newName = document.getElementById('f-rename').value.trim();
      if (!newName) return toast('Введите название');
      try {
        await renameGymInDb(id, newName);
        closeModal();
        await loadGyms();
        render();
        toast('Зал переименован');
      } catch (e) { toast('Ошибка: ' + e.message); }
    };
    return;
  }

  // Equipment delete
  const eqDel = e.target.closest('[data-delete-eq]');
  if (eqDel) {
    e.stopPropagation();
    const id = Number(eqDel.dataset.deleteEq);
    const eq = equipmentData.find(i => i.id === id);
    showConfirm('Удалить тренажёр «' + (eq ? eq.brand + ' ' + eq.name : id) + '»?', async () => {
      await deleteEquipment(id);
      await loadEquipment();
      render();
      toast('Тренажёр удалён');
    });
    return;
  }

  // Exercise delete
  const exDel = e.target.closest('[data-delete-ex]');
  if (exDel) {
    e.stopPropagation();
    const id = exDel.dataset.deleteEx;
    const ex = exerciseData.find(i => i.id === id);
    showConfirm('Удалить упражнение «' + (ex ? (ex.name_ru || ex.name_en) : id) + '»?', async () => {
      await deleteExercise(id);
      await loadExercises();
      render();
      toast('Упражнение удалено');
    });
    return;
  }

  // Equipment card click -> open detail panel
  if (currentTab === 'equipment') {
    const card = e.target.closest('.card[data-eq-id]');
    if (card) {
      openEquipmentDetail(Number(card.dataset.eqId));
      return;
    }
  }

  // Exercise card click -> open exercise detail panel
  if (currentTab === 'exercises') {
    const card = e.target.closest('.card[data-ex-id]');
    if (card) {
      openExerciseDetail(card.dataset.exId);
      return;
    }
  }
});

// Detail panel: back button
document.getElementById('det-back').addEventListener('click', closeEquipmentDetail);

// Detail panel: search
document.getElementById('det-search').addEventListener('input', e => renderDetSearchResults(e.target.value));

// Detail panel: show all toggle
document.getElementById('det-show-all').addEventListener('change', e => {
  showAllExercises = e.target.checked;
  renderMuscleGroups();
  const q = document.getElementById('det-search').value;
  if (q.trim()) renderDetSearchResults(q);
});

// Detail panel: clicks (toggle link, unlink, muscle group expand, exercise_type editor)
document.getElementById('det-overlay').addEventListener('click', async e => {
  // Exercise type: remove tag
  const etRemove = e.target.closest('[data-et-remove]');
  if (etRemove) {
    const typeToRemove = etRemove.dataset.etRemove;
    const types = (detEquipment.exercise_type || '').split(',').map(t => t.trim()).filter(Boolean);
    const newTypes = types.filter(t => t !== typeToRemove);
    etRemove.closest('.et-tag').style.opacity = '0.3';
    await updateExerciseType(newTypes.join(','));
    return;
  }

  // Exercise type: add button
  if (e.target.id === 'et-add-btn' || e.target.closest('#et-add-btn')) {
    const sel = document.getElementById('et-select');
    const newType = sel.value;
    if (!newType || !detEquipment) return;
    const types = (detEquipment.exercise_type || '').split(',').map(t => t.trim()).filter(Boolean);
    if (types.includes(newType)) return;
    types.push(newType);
    sel.disabled = true;
    await updateExerciseType(types.join(','));
    return;
  }

  // Toggle exercise link
  const toggle = e.target.closest('[data-toggle-ex]');
  if (toggle) { toggleExerciseLink(toggle.dataset.toggleEx); return; }

  // Unlink from linked list
  const unlink = e.target.closest('[data-unlink-ex]');
  if (unlink) { toggleExerciseLink(unlink.dataset.unlinkEx); return; }

  // Muscle group expand/collapse
  const header = e.target.closest('.muscle-group-header');
  if (header) {
    header.parentElement.classList.toggle('open');
    return;
  }
});

// Exercise detail panel: back button
document.getElementById('exdet-back').addEventListener('click', closeExerciseDetail);

// Exercise detail panel: click on linked equipment -> open that equipment
document.getElementById('exdet-overlay').addEventListener('click', e => {
  const gotoEq = e.target.closest('[data-goto-eq]');
  if (gotoEq) {
    closeExerciseDetail();
    setTimeout(() => openEquipmentDetail(Number(gotoEq.dataset.gotoEq)), 350);
  }
});

// Escape closes detail panels
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('exdet-overlay').classList.contains('visible')) {
      closeExerciseDetail();
    } else if (document.getElementById('det-overlay').classList.contains('visible')) {
      closeEquipmentDetail();
    }
  }
});

// ===== INIT =====
async function init() {
  document.getElementById('stats').textContent = 'Загрузка...';
  await Promise.all([loadProfiles(), loadGyms(), loadEquipment(), loadExercises()]);
  renderFilters();
  render();
  loadLinkCounts().then(() => render());
}
init();
</script>

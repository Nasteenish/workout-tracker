<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ-панель</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 16px; padding-bottom: 100px; }
h1 { text-align: center; margin: 16px 0; font-size: 24px; }
.stats { text-align: center; margin-bottom: 12px; color: #888; font-size: 14px; }

.tabs { display: flex; justify-content: center; gap: 0; margin-bottom: 16px; }
.tab { padding: 10px 20px; border: 1px solid #333; background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
.tab:first-child { border-radius: 10px 0 0 10px; }
.tab:last-child { border-radius: 0 10px 10px 0; }
.tab.active { background: #4a9eff; color: #fff; border-color: #4a9eff; }

.filters { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; position: sticky; top: 0; background: #0a0a0a; padding: 12px 0; z-index: 10; }
.filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 13px; transition: all 0.2s; }
.filter-btn.active { background: #4a9eff; color: #fff; border-color: #4a9eff; }
.filter-btn:hover { border-color: #4a9eff; }

.search { width: 100%; max-width: 400px; padding: 10px 16px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; font-size: 14px; margin: 0 auto 20px; display: block; }
.search:focus { outline: none; border-color: #4a9eff; }

/* List items (for gyms) */
.list { max-width: 600px; margin: 0 auto; }
.list-item { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; border: 1px solid #222; border-radius: 12px; padding: 16px; margin-bottom: 8px; transition: border-color 0.2s; }
.list-item:hover { border-color: #333; }
.list-item-info { flex: 1; min-width: 0; }
.list-item-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
.list-item-meta { font-size: 13px; color: #888; }
.list-item-actions { display: flex; gap: 8px; margin-left: 12px; flex-shrink: 0; }

/* Grid (for equipment/exercises) */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: transform 0.2s, border-color 0.2s; cursor: pointer; position: relative; }
.card:hover { transform: translateY(-2px); border-color: #444; }
.card-img { width: 100%; height: 180px; object-fit: contain; background: #fff; padding: 8px; }
.card-img.no-img { display: flex; align-items: center; justify-content: center; background: #222; color: #555; font-size: 40px; }
.card-body { padding: 12px; }
.card-brand { font-size: 11px; color: #4a9eff; text-transform: uppercase; letter-spacing: 1px; }
.card-name { font-size: 14px; font-weight: 600; margin: 4px 0; }
.card-name-secondary { font-size: 12px; color: #999; margin-bottom: 4px; }
.card-model { font-size: 12px; color: #888; }
.card-meta { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #252525; color: #aaa; }
.tag.muscle { background: #1a2a1a; color: #6c6; }
.tag.type { background: #1a1a2a; color: #88f; }
.tag.cat { background: #2a1a1a; color: #c88; }
.tag.level { background: #2a2a1a; color: #cc8; }

.card-imgs { display: flex; gap: 2px; background: #fff; height: 180px; }
.card-imgs img { flex: 1; height: 100%; object-fit: contain; padding: 4px; }

.card-delete { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; border: none; background: rgba(220, 50, 50, 0.85); color: #fff; font-size: 16px; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 5; line-height: 1; }
.card:hover .card-delete { display: flex; }
.card-delete:hover { background: #e03030; }

/* Buttons */
.btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: #4a9eff; color: #fff; }
.btn-primary:hover { background: #3a8eef; }
.btn-danger { background: #dc3545; color: #fff; }
.btn-danger:hover { background: #c82333; }
.btn-secondary { background: #333; color: #ccc; }
.btn-secondary:hover { background: #444; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* FAB */
.fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; border: none; background: #4a9eff; color: #fff; font-size: 28px; cursor: pointer; box-shadow: 0 4px 16px rgba(74,158,255,0.4); display: flex; align-items: center; justify-content: center; z-index: 50; transition: all 0.2s; }
.fab:hover { transform: scale(1.1); background: #3a8eef; }

/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; padding: 16px; }
.modal-overlay.open { display: flex; }
.modal { background: #1a1a1a; border-radius: 16px; border: 1px solid #333; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #252525; }
.modal-header h2 { font-size: 18px; font-weight: 700; }
.modal-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: #333; color: #ccc; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: #444; }
.modal-body { padding: 20px; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; font-weight: 500; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid #333; background: #0a0a0a; color: #e0e0e0; font-size: 14px; font-family: inherit; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #4a9eff; }
.form-group textarea { min-height: 80px; resize: vertical; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* Empty state */
.empty { text-align: center; color: #555; font-size: 16px; margin-top: 60px; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }

/* Confirm dialog */
.confirm-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 200; justify-content: center; align-items: center; padding: 16px; }
.confirm-overlay.open { display: flex; }
.confirm-box { background: #1a1a1a; border-radius: 16px; border: 1px solid #333; padding: 24px; max-width: 400px; width: 100%; text-align: center; }
.confirm-box p { font-size: 16px; margin-bottom: 20px; line-height: 1.5; }
.confirm-actions { display: flex; gap: 8px; justify-content: center; }

/* Toast */
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 14px; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* Equipment exercise count */
.card-ex-count { font-size: 11px; color: #4a9eff; margin-top: 6px; }

/* Detail overlay */
.det-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0a0a0a; z-index: 80; overflow-y: auto; -webkit-overflow-scrolling: touch; transform: translateX(100%); transition: transform 0.3s; }
.det-overlay.visible { transform: translateX(0); }
.det-topbar { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #222; position: sticky; top: 0; background: #0a0a0a; z-index: 5; }
.det-topbar-back { background: none; border: none; color: #4a9eff; font-size: 16px; cursor: pointer; padding: 4px 8px; margin-right: 8px; }
.det-topbar-title { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.det-header { display: flex; gap: 16px; padding: 16px; }
.det-header-img { width: 120px; height: 120px; object-fit: contain; background: #fff; border-radius: 12px; padding: 8px; flex-shrink: 0; }
.det-header-img.no-img { display: flex; align-items: center; justify-content: center; background: #222; color: #555; font-size: 40px; }
.det-header-info { flex: 1; min-width: 0; }
.det-brand { font-size: 11px; color: #4a9eff; text-transform: uppercase; letter-spacing: 1px; }
.det-name { font-size: 18px; font-weight: 700; margin: 4px 0; }
.det-model { font-size: 13px; color: #888; }
.det-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.det-section-title { font-size: 14px; font-weight: 600; color: #aaa; padding: 12px 16px 8px; text-transform: uppercase; letter-spacing: 1px; }
.det-linked { padding: 0 16px; }
.linked-ex-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
.linked-ex-name { flex: 1; min-width: 0; }
.linked-ex-name div:first-child { font-size: 14px; font-weight: 500; }
.linked-ex-name-en { font-size: 12px; color: #666; }
.linked-ex-remove { background: none; border: none; color: #c55; font-size: 20px; cursor: pointer; padding: 4px 8px; }
.linked-ex-empty { color: #555; font-size: 14px; padding: 8px 0; }
.det-search-wrap { padding: 12px 16px; display: flex; gap: 8px; align-items: center; }
.det-search { flex: 1; padding: 8px 14px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; font-size: 14px; }
.det-search:focus { outline: none; border-color: #4a9eff; }
.det-show-all-label { font-size: 12px; color: #888; white-space: nowrap; display: flex; align-items: center; gap: 4px; cursor: pointer; }
.det-search-results { padding: 0 16px; display: none; }
.muscle-group { border-bottom: 1px solid #1a1a1a; }
.muscle-group-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; cursor: pointer; }
.muscle-group-label { font-size: 14px; font-weight: 600; }
.muscle-group-count { font-size: 12px; color: #666; margin-right: 6px; }
.muscle-group-arrow { font-size: 10px; color: #666; transition: transform 0.2s; display: inline-block; }
.muscle-group.open .muscle-group-arrow { transform: rotate(90deg); }
.muscle-group-exercises { display: none; padding: 0 16px 8px; }
.muscle-group.open .muscle-group-exercises { display: block; }
.ex-option { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #111; cursor: pointer; }
.ex-option:hover { background: #151515; }
.ex-option.linked { background: #0a1a0a; }
.ex-option-name { flex: 1; min-width: 0; }
.ex-option-name-ru { font-size: 14px; }
.ex-option-name-en { font-size: 11px; color: #666; }
.ex-option-check { font-size: 16px; color: #4a9eff; width: 24px; text-align: center; flex-shrink: 0; }

/* Drag & drop */
.ex-draggable { cursor: grab; }
.ex-draggable:active { cursor: grabbing; }
.ex-dragging { opacity: 0.35; }
.muscle-drop-zone.drag-over { background: rgba(74,158,255,0.12); border-radius: 8px; outline: 2px dashed #4a9eff; }
.muscle-section-title.drag-over { color: #fff; background: rgba(74,158,255,0.15); border-radius: 6px; padding-left: 8px; }

/* Exercise type editor */
.et-section { padding: 0 16px 8px; }
.et-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.et-tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 14px; background: #1a2a1a; color: #6c6; font-size: 12px; font-family: monospace; }
.et-tag-remove { cursor: pointer; color: #f66; font-size: 14px; margin-left: 2px; line-height: 1; }
.et-tag-remove:hover { color: #f00; }
.et-add { display: flex; gap: 6px; }
.et-select { flex: 1; padding: 6px 10px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; font-size: 13px; }
.et-select:focus { outline: none; border-color: #4a9eff; }
.et-add-btn { padding: 6px 14px; border-radius: 10px; border: none; background: #4a9eff; color: #fff; font-size: 13px; cursor: pointer; white-space: nowrap; }
.et-add-btn:hover { background: #3a8eef; }
.et-matched-item { padding: 3px 0; font-size: 13px; color: #aaa; border-bottom: 1px solid #151515; }

/* Exercise Detail overlay */
.exdet-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0a0a0a; z-index: 80; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s; -webkit-overflow-scrolling: touch; }
.exdet-overlay.visible { transform: translateX(0); }
.exdet-topbar { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #222; position: sticky; top: 0; background: #0a0a0a; z-index: 5; }
.exdet-topbar-back { background: none; border: none; color: #4a9eff; font-size: 16px; cursor: pointer; padding: 4px 8px; margin-right: 8px; }
.exdet-topbar-title { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.exdet-images { display: flex; gap: 2px; background: #fff; width: 100%; }
.exdet-images img { flex: 1; min-width: 0; max-height: 280px; object-fit: contain; padding: 8px; }
.exdet-images.single img { max-width: 100%; }
.exdet-no-img { width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; background: #222; color: #555; font-size: 60px; }
.exdet-body { padding: 16px; }
.exdet-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.exdet-name-en { font-size: 14px; color: #888; margin-bottom: 12px; }
.exdet-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.exdet-section { margin-top: 20px; }
.exdet-section-title { font-size: 13px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.exdet-muscles { display: flex; flex-direction: column; gap: 4px; }
.exdet-muscle-row { display: flex; align-items: center; gap: 8px; }
.exdet-muscle-label { font-size: 12px; color: #666; width: 80px; flex-shrink: 0; }
.exdet-muscle-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.exdet-instructions { list-style: decimal; padding-left: 20px; font-size: 14px; line-height: 1.6; color: #ccc; }
.exdet-instructions li { margin-bottom: 6px; }
.exdet-equipment-list { display: flex; flex-direction: column; gap: 6px; }
.exdet-eq-item { display: flex; align-items: center; gap: 10px; padding: 8px; background: #1a1a1a; border-radius: 10px; border: 1px solid #222; }
.exdet-eq-img { width: 50px; height: 50px; object-fit: contain; background: #fff; border-radius: 8px; padding: 4px; flex-shrink: 0; }
.exdet-eq-img.no-img { display: flex; align-items: center; justify-content: center; background: #222; color: #555; font-size: 20px; }
.exdet-eq-info { flex: 1; min-width: 0; }
.exdet-eq-brand { font-size: 10px; color: #4a9eff; text-transform: uppercase; letter-spacing: 0.5px; }
.exdet-eq-name { font-size: 13px; font-weight: 500; }

/* Drag & drop */
.ex-draggable { cursor: grab; }
.ex-draggable:active { cursor: grabbing; }
.ex-dragging { opacity: 0.4; }
.drop-zone { transition: background 0.15s, border-color 0.15s; }
.drop-zone.drag-over { background: rgba(74,158,255,0.12) !important; border-radius: 8px; outline: 2px dashed #4a9eff; }
/* Image upload zone */
.img-upload-zone { border: 2px dashed #333; border-radius: 12px; padding: 20px 16px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
.img-upload-zone:hover, .img-upload-zone.drag-over { border-color: #4a9eff; background: rgba(74,158,255,0.05); }
.img-upload-zone input[type=file] { display: none; }
.img-upload-hint { color: #666; font-size: 13px; line-height: 1.4; }
.img-upload-hint span { color: #4a9eff; }
.img-upload-previews { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; margin-top: 12px; padding: 12px; background: #111; border-radius: 10px; }
.img-preview-block { display: flex; flex-direction: column; gap: 5px; align-items: center; }
.img-preview-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.8px; }
.img-preview-thumb { width: 48px; height: 48px; object-fit: cover; background: #fff; border-radius: 50%; display: block; }
.img-preview-detail { width: 160px; height: 110px; object-fit: contain; background: #fff; border-radius: 8px; padding: 6px; display: block; }
.img-upload-filename { font-size: 11px; color: #4a9eff; margin-top: 4px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.img-upload-multiple { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.img-upload-thumb-item { position: relative; width: 64px; height: 64px; border-radius: 8px; overflow: hidden; border: 2px solid #333; }
.img-upload-thumb-item img { width: 100%; height: 100%; object-fit: contain; background: #fff; }
.img-upload-thumb-item .remove-img { position: absolute; top: 1px; right: 1px; background: rgba(0,0,0,0.7); border: none; color: #f66; font-size: 12px; cursor: pointer; border-radius: 4px; padding: 1px 4px; line-height: 1; }

/* Image manager in exercise detail */
.exdet-img-manager { padding: 12px 0; background: #111; }
.exdet-img-manager-title { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; padding: 0 16px 8px; }
.exdet-img-cards { display: flex; gap: 10px; padding: 0 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.exdet-img-card { flex-shrink: 0; width: 120px; background: #1a1a1a; border-radius: 10px; overflow: hidden; border: 2px solid transparent; position: relative; }
.exdet-img-card.is-main { border-color: #4a9eff; }
.exdet-img-card img { width: 100%; height: 90px; object-fit: contain; background: #fff; display: block; }
.exdet-img-badge { position: absolute; top: 4px; left: 4px; background: #4a9eff; color: #fff; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 6px; }
.exdet-img-actions { display: flex; gap: 4px; padding: 6px; }
.exdet-img-btn { flex: 1; background: #2a2a2a; border: none; color: #ccc; font-size: 11px; padding: 5px 2px; border-radius: 6px; cursor: pointer; text-align: center; }
.exdet-img-btn:hover { background: #333; }
.exdet-img-btn.primary { background: #1a3a5c; color: #4a9eff; }
.exdet-img-btn:disabled { opacity: 0.3; cursor: default; }

.no-cat-section { margin-top: 24px; border-top: 1px solid #333; padding-top: 16px; }

/* Mobile fixes */
@media (hover: none) {
  .card-delete { display: flex; opacity: 0.7; }
}
@media (max-width: 480px) {
  .det-header { flex-direction: column; align-items: center; text-align: center; }
  .det-header-img { width: 100px; height: 100px; }
  .det-tags { justify-content: center; }
}
</style>
</head>
<body>

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
  <h1 style="margin:0">Админ-панель</h1>
  <button class="btn btn-primary" id="publish-btn">Опубликовать</button>
</div>
<div class="stats" id="stats"></div>

<div class="tabs">
  <div class="tab active" data-tab="gyms">Залы</div>
  <div class="tab" data-tab="equipment">Тренажёры</div>
  <div class="tab" data-tab="exercises">Упражнения</div>
</div>

<div class="filters" id="filters"></div>

<input type="text" class="search" id="search" placeholder="Поиск..." style="display:none">

<div id="content"></div>

<button class="fab" id="fab" title="Добавить">+</button>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Добавить</h2>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Confirm dialog -->
<div class="confirm-overlay" id="confirm">
  <div class="confirm-box">
    <p id="confirm-text"></p>
    <div class="confirm-actions">
      <button class="btn btn-secondary" id="confirm-cancel">Отмена</button>
      <button class="btn btn-danger" id="confirm-ok">Удалить</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Equipment Detail Panel -->
<div class="det-overlay" id="det-overlay">
  <div class="det-topbar">
    <button class="det-topbar-back" id="det-back">← Назад</button>
    <div class="det-topbar-title" id="det-topbar-title"></div>
  </div>
  <div id="det-header"></div>

  <!-- Linked exercises -->
  <div class="det-section-title" style="margin-top:8px">Привязанные упражнения</div>
  <div id="det-linked" style="padding:0 16px"></div>

  <!-- Search to add exercises -->
  <div class="det-section-title" style="margin-top:16px">Добавить упражнение</div>
  <div class="det-search-wrap">
    <input class="det-search" type="text" id="det-search" placeholder="Поиск упражнения...">
  </div>
  <div class="det-search-results" id="det-search-results" style="display:none"></div>
  <div id="det-muscle-groups" style="padding:0 16px 40px"></div>

  <!-- Exercise type (advanced, collapsed) -->
  <details style="margin:0 16px 24px;border:1px solid #222;border-radius:10px;padding:0">
    <summary style="padding:10px 14px;font-size:12px;color:#555;cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between">
      <span>⚙️ Автопривязка по типу (exercise_type)</span><span style="font-size:10px">▶</span>
    </summary>

  if (!_reverseTypeMap[type]) _reverseTypeMap[type] = [];

}
const ALL_EXERCISE_TYPES = Object.keys(_reverseTypeMap).sort();

function getMatchingExercises(exerciseTypeStr) {
  if (!exerciseTypeStr) return [];
  const types = exerciseTypeStr.split(',').map(t => t.trim()).filter(Boolean);
  const names = new Set();
  types.forEach(type => {
    const m = _reverseTypeMap[type];
    if (m) m.forEach(n => names.add(n));
  });
  return [...names].sort();
}

function renderFilters() {
  const filtersEl = document.getElementById('filters');
  const searchEl = document.getElementById('search');

  if (currentTab === 'gyms') {
    filtersEl.innerHTML = '';
    searchEl.style.display = 'none';
    return;
  }

  searchEl.style.display = 'block';

  let filters;
  if (currentTab === 'equipment') {
    const brands = [...new Set(equipmentData.map(i => i.brand))].sort();
    filters = [{ key: 'all', label: 'Все' }, ...brands.map(b => ({ key: b, label: b }))];
  } else {
    const muscles = [...new Set(exerciseData.flatMap(e => e.primary_muscles || []))].sort();
    filters = [{ key: 'all', label: 'Все' }, ...muscles.map(m => ({ key: m, label: MUSCLE_RU[m] || m }))];
  }

  filtersEl.innerHTML = filters.map(f =>
    '<button class="filter-btn' + (currentFilter === f.key ? ' active' : '') + '" data-filter="' + f.key + '">' + f.label + '</button>'
  ).join('');
}

function render() {
  const query = document.getElementById('search').value.toLowerCase();
  const content = document.getElementById('content');
  const statsEl = document.getElementById('stats');

  if (currentTab === 'gyms') {
    renderGyms(content, statsEl);
  } else if (currentTab === 'equipment') {
    renderEquipmentGrid(content, statsEl, query);
  } else {
    renderExerciseGrid(content, statsEl, query);
  }
}

function renderGyms(container, statsEl) {
  statsEl.textContent = 'Залы: ' + gymsData.length;

  if (!gymsData.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🏢</div>Нет сохранённых залов</div>';
    return;
  }

  container.innerHTML = '<div class="list">' + gymsData.map(gym => {
    const date = gym.created_at ? new Date(gym.created_at).toLocaleDateString('ru-RU') : '—';
    return `
      <div class="list-item" data-gym-id="${esc(gym.id)}">
        <div class="list-item-info">
          <div class="list-item-name">${esc(gym.name)}</div>
          <div class="list-item-meta">
            ${gym.city ? esc(gym.city) + ' · ' : ''}Создан: ${date}${gym.created_by && profilesCache[gym.created_by] ? ' · ' + esc(profilesCache[gym.created_by]) : ''}
          </div>
        </div>
        <div class="list-item-actions">
          <button class="btn btn-secondary btn-sm gym-rename" data-id="${esc(gym.id)}">Переименовать</button>
          <button class="btn btn-danger btn-sm gym-delete" data-id="${esc(gym.id)}">Удалить</button>
        </div>
      </div>
    `;
  }).join('') + '</div>';
}

function renderEquipmentGrid(container, statsEl, query) {
  const filtered = equipmentData.filter(item => {
    if (currentFilter !== 'all' && item.brand !== currentFilter) return false;
    if (query && !item.name.toLowerCase().includes(query) && !(item.model || '').toLowerCase().includes(query) && !(item.brand || '').toLowerCase().includes(query)) return false;
    return true;
  });
  statsEl.textContent = 'Тренажёры: ' + filtered.length + ' / ' + equipmentData.length;

  if (!filtered.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🏋️</div>Тренажёры не найдены</div>';
    return;
  }

  container.innerHTML = '<div class="grid">' + filtered.map(item => `
    <div class="card" data-eq-id="${item.id}">
      <button class="card-delete" data-delete-eq="${item.id}" title="Удалить">&times;</button>
      ${item.image_url
        ? '<img class="card-img" src="' + esc(item.image_url) + '" loading="lazy">'
        : '<div class="card-img no-img">🏋️</div>'}
      <div class="card-body">
        <div class="card-brand">${esc(item.brand)}</div>
        <div class="card-name">${esc(item.name)}</div>
        <div class="card-model">${esc(item.model || '—')}</div>
        <div class="card-meta">
          <span class="tag muscle">${esc(item.muscle_group || '—')}</span>
          <span class="tag type">${esc(item.equipment_type || '—')}</span>
        </div>
        ${linkCounts[item.id] ? '<div class="card-ex-count">▶ ' + linkCounts[item.id] + ' упр.</div>' : ''}
      </div>
    </div>
  `).join('') + '</div>';
}

}

  return '<div style="width:' + s + 'px;height:' + s + 'px;border-radius:50%;background:#222;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">💪</div>';

function renderExerciseGrid(container, statsEl, query) {
  const filtered = exerciseData.filter(item => {
    if (currentFilter !== 'all' && !(item.primary_muscles || []).includes(currentFilter)) return false;
    if (query) {
      const match = (item.name_ru || '').toLowerCase().includes(query) ||
                    (item.name_en || '').toLowerCase().includes(query);
      if (!match) return false;
    }
    return true;
  });
  statsEl.textContent = 'Упражнения: ' + filtered.length + ' / ' + exerciseData.length;

  if (!filtered.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">💪</div>Упражнения не найдены</div>';
    return;
  }

  if (query) {
    container.innerHTML = '<div style="max-width:600px;margin:0 auto">' + filtered.map(item => renderExerciseRow(item, false)).join('') + '</div>';
    return;
  }

  const MUSCLE_ORDER = ['chest','shoulders','triceps','biceps','forearms','lats','upper_back','lower_back','traps','abdominals','quadriceps','hamstrings','glutes','calves','abductors','adductors','neck','cardio'];
  const withCat = filtered.filter(i => i.primary_muscles && i.primary_muscles.length > 0);
  const noCat = exerciseData.filter(i => !i.primary_muscles || i.primary_muscles.length === 0);

  const groups = {};
  for (const item of withCat) {
    const base = getExerciseBaseName(item.name_ru || item.name_en || '');
    const muscle = item.primary_muscles[0];
    const key = base + '|' + muscle;
    if (!groups[key]) groups[key] = { base, muscle, items: [] };
    groups[key].items.push(item);
  }

  const sorted = Object.values(groups).sort((a, b) => {
    const iA = MUSCLE_ORDER.indexOf(a.muscle), iB = MUSCLE_ORDER.indexOf(b.muscle);
    const mi = (iA < 0 ? 99 : iA) - (iB < 0 ? 99 : iB);
    return mi !== 0 ? mi : a.base.localeCompare(b.base, 'ru');
  });

  let currentMuscle = null;
  let html = '<div style="max-width:600px;margin:0 auto">';

  for (const g of sorted) {
    if (g.muscle !== currentMuscle) {
      currentMuscle = g.muscle;
      html += `<div class="muscle-drop-zone" data-drop-muscle="${esc(g.muscle)}"
        style="padding:16px 0 8px;font-size:13px;font-weight:700;color:#4a9eff;text-transform:uppercase;letter-spacing:1px">
        ${esc(MUSCLE_RU[g.muscle] || g.muscle)}
      </div>`;
    }
    if (g.items.length === 1) {
      html += renderExerciseRow(g.items[0], false);
    } else {
      html += `
        <div class="muscle-group muscle-drop-zone" data-drop-muscle="${esc(g.muscle)}" data-drop-base="${esc(g.base)}" style="border-bottom:1px solid #1a1a1a;border-radius:0">
          <div class="muscle-group-header" style="padding:10px 0;gap:12px;display:flex;align-items:center">
            ${exThumbHtml(g.items[0], 48)}
            <span class="muscle-group-label" style="flex:1">${esc(g.base)}</span>
            <button class="btn btn-secondary btn-sm" data-rename-group="${esc(g.base)}" data-rename-muscle="${esc(g.muscle)}" style="padding:3px 8px;font-size:12px;flex-shrink:0" title="Переименовать группу">✏️</button>
            <span class="muscle-group-count">${g.items.length}</span>
            <span class="muscle-group-arrow">▶</span>
          </div>
          <div class="muscle-group-exercises" style="padding-left:60px">
            ${g.items.map((item, idx) => renderExerciseRow(item, true, idx, g.items.length)).join('')}
          </div>
        </div>`;
    }
  }

  if (noCat.length > 0) {
    html += `<div class="no-cat-section">
      <div style="padding:8px 0 12px;font-size:13px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px">
        Без категории (${noCat.length}) — перетащи в нужную группу ↑
      </div>
      ${noCat.map(item => renderExerciseRow(item, false)).join('')}
    </div>`;
  }

  html += '</div>';
  container.innerHTML = html;
}

// ===== GROUP REORDER =====

async function reorderExerciseInGroup(exId, dir) {
  const ex = exerciseData.find(i => i.id === exId);
  if (!ex) return;
  const base = getExerciseBaseName(ex.name_ru || ex.name_en || '');
  const muscle = (ex.primary_muscles || [])[0];
  // Get all siblings in same group, in current display order
  const group = exerciseData.filter(i =>
    getExerciseBaseName(i.name_ru || i.name_en || '') === base &&
    (i.primary_muscles || [])[0] === muscle
  );
  const idx = group.findIndex(i => i.id === exId);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= group.length) return;

  // Swap and reassign sort_orders (multiples of 10 for breathing room)
  [group[idx], group[newIdx]] = [group[newIdx], group[idx]];
  try {
    await Promise.all(group.map((item, i) => {
      const newOrder = i * 10;
      if (item.sort_order === newOrder) return Promise.resolve();
      return patchExercise(item.id, { sort_order: newOrder });
    }));
    // Update local cache order
    group.forEach((item, i) => { item.sort_order = i * 10; });
    // Re-sort exerciseData
    exerciseData.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0) || (a.name_ru || '').localeCompare(b.name_ru || '', 'ru'));
    render();
  } catch(e) { toast('Ошибка: ' + e.message); }
}

async function uploadExerciseImage(file, exId) {
  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g, '');
  const path = `exercises/${exId}/${Date.now()}.${ext}`;
  const r = await fetch(`${SB}/storage/v1/object/equipment-images/${path}`, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + SERVICE_KEY, 'Content-Type': file.type || 'image/jpeg', 'x-upsert': 'true' },
    body: file
  });
  if (!r.ok) throw new Error('Ошибка загрузки: ' + await r.text());
  return `${SB}/storage/v1/object/public/equipment-images/${path}`;
}

// Pending upload files (for new exercise form)
let _pendingUploadFiles = [];

function initUploadZone(zoneId, onFilesChanged) {
  const zone = document.getElementById(zoneId);
  if (!zone) return;
  const input = zone.querySelector('input[type=file]');

  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
    if (files.length) { _pendingUploadFiles.push(...files); onFilesChanged(); }
  });
  input.addEventListener('change', () => {
    const files = [...input.files].filter(f => f.type.startsWith('image/'));
    if (files.length) { _pendingUploadFiles.push(...files); onFilesChanged(); }
    input.value = '';
  });
}

function renderUploadPreviews(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!_pendingUploadFiles.length) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px">Предпросмотр</div>
    <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap">
      ${_pendingUploadFiles.map((f, i) => {
        const url = URL.createObjectURL(f);
        const isFirst = i === 0;
        return `
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            ${isFirst ? `
              <div class="img-preview-block">
                <div class="img-preview-label">В списке</div>
                <img class="img-preview-thumb" src="${url}">
              </div>
            ` : ''}
            <div class="img-preview-block">
              <div class="img-preview-label">${isFirst ? 'Главная' : 'Фото ' + (i+1)}</div>
              <img class="img-preview-detail" src="${url}">
              <div style="font-size:11px;color:#4a9eff;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</div>
            </div>
            <button onclick="event.stopPropagation();_pendingUploadFiles.splice(${i},1);renderUploadPreviews('${containerId}')" style="background:#2a2a2a;border:none;color:#f66;font-size:11px;border-radius:6px;padding:3px 8px;cursor:pointer">Удалить</button>

        `;
      }).join('')}
    </div>
  `;
}

          ${ex.name_en ? '<div style="font-size:12px;color:#666">' + esc(ex.name_en) + '</div>' : ''}
        </div>
        <button class="linked-ex-remove" data-unlink-ex="${esc(ex.id)}" title="Убрать привязку" style="flex-shrink:0">×</button>
      </div>
    `).join('');
    return `
      <div>
        <div style="font-size:11px;font-weight:700;color:#4a9eff;text-transform:uppercase;letter-spacing:1px;padding:12px 0 4px">${esc(label)} <span style="color:#555;font-weight:400">(${exs.length})</span></div>
        ${rows}
      </div>
    `;
  }).join('');
}

function renderMuscleGroups() {
  const groups = {};
  getFilteredExercises().forEach(ex => {
    const muscle = (ex.primary_muscles && ex.primary_muscles[0]) || 'other';
    if (!groups[muscle]) groups[muscle] = [];
    groups[muscle].push(ex);
  });

  const sortedMuscles = Object.keys(groups).sort((a, b) => {
    return (MUSCLE_RU[a] || a).localeCompare(MUSCLE_RU[b] || b, 'ru');
  });

  const muscleGroupsEl = document.getElementById('det-muscle-groups');
  muscleGroupsEl.innerHTML = sortedMuscles.map(muscle => {
    const exercises = groups[muscle];
    if (!exercises.length) return '';
    const label = MUSCLE_RU[muscle] || muscle;
    const exHtml = exercises.map(ex => {
      const linked = detLinkedIds.has(ex.id);
      return `
        <div class="ex-option ${linked ? 'linked' : ''}" data-toggle-ex="${esc(ex.id)}" style="gap:10px">
          ${exThumbHtml(ex, 36)}
          <div class="ex-option-name" style="flex:1;min-width:0">
            <div class="ex-option-name-ru">${ex.name_ru || ex.name_en}</div>
            <div class="ex-option-name-en">${ex.name_en}</div>
          </div>
          <div class="ex-option-check">${linked ? '✓' : ''}</div>
        </div>
      `;
    }).join('');
    return `
      <div class="muscle-group" data-muscle="${muscle}">
        <div class="muscle-group-header">
          <span class="muscle-group-label">${label}</span>
          <span>
            <span class="muscle-group-count">${exercises.length}</span>
            <span class="muscle-group-arrow">▶</span>
          </span>
        </div>
        <div class="muscle-group-exercises">${exHtml}</div>
      </div>
    `;
  }).join('');
}

function renderDetSearchResults(query) {
  const resultsEl = document.getElementById('det-search-results');
  if (!query.trim()) { resultsEl.style.display = 'none'; return; }
  const q = query.toLowerCase();
  const matches = getFilteredExercises().filter(ex =>
    (ex.name_ru || '').toLowerCase().includes(q) || (ex.name_en || '').toLowerCase().includes(q)
  ).slice(0, 30);

  if (!matches.length) {
    resultsEl.style.display = 'block';
    resultsEl.innerHTML = '<div style="color:#555;font-size:14px;padding:8px">Не найдено</div>';
    return;
  }
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = matches.map(ex => {
    const linked = detLinkedIds.has(ex.id);
    return `
      <div class="ex-option ${linked ? 'linked' : ''}" data-toggle-ex="${esc(ex.id)}" style="gap:10px">
        ${exThumbHtml(ex, 36)}
        <div class="ex-option-name" style="flex:1;min-width:0">
          <div class="ex-option-name-ru">${ex.name_ru || ex.name_en}</div>
          <div class="ex-option-name-en">${ex.name_en}</div>
        </div>
        <div class="ex-option-check">${linked ? '✓' : ''}</div>
      </div>
    `;
  }).join('');
}

async function toggleExerciseLink(exerciseId) {
  if (!detEquipment) return;
  const eqId = detEquipment.id;
  if (detLinkedIds.has(exerciseId)) {
    await unlinkExercise(eqId, exerciseId);
    detLinkedIds.delete(exerciseId);
    linkCounts[eqId] = Math.max(0, (linkCounts[eqId] || 1) - 1);
    if (!linkCounts[eqId]) delete linkCounts[eqId];
  } else {
    await linkExercise(eqId, exerciseId);
    detLinkedIds.add(exerciseId);
    linkCounts[eqId] = (linkCounts[eqId] || 0) + 1;
  }
  renderLinked();
  const q = document.getElementById('det-search').value;
  if (q.trim()) renderDetSearchResults(q);
  else renderMuscleGroups();
}

let _editRemovedImgs = new Set();

function showEditExerciseForm() {
  if (!detExercise) return;
  const ex = detExercise;
  _pendingUploadFiles = [];
  _editRemovedImgs = new Set();

  const existingImgs = ex.images || [];
  const imgsHtml = existingImgs.length ? `
    <div class="form-group">
      <label>Текущие фото</label>
      <div id="f-exedit-imgs" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">

            <button onclick="
              _editRemovedImgs.add('${esc(url)}');
              document.getElementById('f-exedit-img-wrap-${i}').style.opacity='0.25';
              this.disabled=true;
            " style="position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:#c55;border:none;color:#fff;font-size:12px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center">&times;</button>
          </div>
        `).join('')}
      </div>
    </div>
  ` : '';

  openModal('Изменить упражнение', `
    <div class="form-group">
      <label>Название (рус)</label>
      <input type="text" id="f-exedit-name-ru" value="${esc(ex.name_ru || '')}">
    </div>
    <div class="form-group">
      <label>Название (eng)</label>
      <input type="text" id="f-exedit-name-en" value="${esc(ex.name_en || '')}">
    </div>
    ${imgsHtml}
    <div class="form-group">
      <label>Добавить фото</label>
      <div class="img-upload-zone" id="f-exedit-upload-zone">
        <input type="file" accept="image/*" multiple>
        <div class="img-upload-hint">Перетащи или <span>нажми для выбора</span></div>
      </div>
      <div id="f-exedit-upload-preview" style="margin-top:8px"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" id="f-exedit-save">Сохранить</button>
    </div>
  `);
  document.getElementById('f-exedit-name-ru').focus();
  initUploadZone('f-exedit-upload-zone', () => renderUploadPreviews('f-exedit-upload-preview'));

  document.getElementById('f-exedit-save').onclick = async () => {
    const nameRu = document.getElementById('f-exedit-name-ru').value.trim();
    const nameEn = document.getElementById('f-exedit-name-en').value.trim();
    const btn = document.getElementById('f-exedit-save');
    btn.disabled = true;
    btn.textContent = _pendingUploadFiles.length ? 'Загрузка...' : 'Сохранение...';
    try {
      // Upload new images
      const newUrls = [];
      for (const file of _pendingUploadFiles) {
        newUrls.push(await uploadExerciseImage(file, ex.id));
      }
      // Build final images array: keep existing minus removed, append new
      const finalImgs = [
        ...(ex.images || []).filter(u => !_editRemovedImgs.has(u)),
        ...newUrls
      ];
      const updates = {};
      if (nameRu || nameEn) { updates.name_ru = nameRu || null; updates.name_en = nameEn || null; }
      updates.images = finalImgs.length ? finalImgs : null;

      await patchExercise(ex.id, updates);
      if (nameRu || nameEn) {
        const _titleEl = document.getElementById('exdet-topbar-title');
        if (_titleEl) _titleEl.textContent = nameRu || nameEn;
        const _nameEl = document.querySelector('.exdet-name');
        if (_nameEl) _nameEl.textContent = nameRu || nameEn;
        const _nameEnEl = document.querySelector('.exdet-name-en');
        if (_nameEnEl) _nameEnEl.textContent = nameEn || '';
      }
      _pendingUploadFiles = [];
      closeModal();
      renderExdetImageSection();
      render();
      toast('Сохранено');
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Сохранить';
      toast('Ошибка: ' + e.message);
    }
  };
}

// Content clicks (delete, rename)
document.getElementById('content').addEventListener('click', async e => {
  // Gym delete
  const gymDel = e.target.closest('.gym-delete');
  if (gymDel) {
    const id = gymDel.dataset.id;
    const gym = gymsData.find(g => g.id === id);
    showConfirm('Удалить зал «' + (gym ? gym.name : id) + '»?', async () => {
      await deleteGymFromDb(id);
      await loadGyms();
      render();
      toast('Зал удалён');
    });
    return;
  }

  // Gym rename
  const gymRen = e.target.closest('.gym-rename');
  if (gymRen) {
    const id = gymRen.dataset.id;
    const gym = gymsData.find(g => g.id === id);
    openModal('Переименовать зал', `
      <div class="form-group">
        <label>Новое название</label>
        <input type="text" id="f-rename" value="${esc(gym ? gym.name : '')}">
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
        <button class="btn btn-primary" id="f-rename-save">Сохранить</button>
      </div>
    `);
    document.getElementById('f-rename').focus();
    document.getElementById('f-rename').select();
    document.getElementById('f-rename-save').onclick = async () => {
      const newName = document.getElementById('f-rename').value.trim();
      if (!newName) return toast('Введите название');
      try {
        await renameGymInDb(id, newName);
        closeModal();
        await loadGyms();
        render();
        toast('Зал переименован');
      } catch (e) { toast('Ошибка: ' + e.message); }
    };
    return;
  }

  // Equipment delete
  const eqDel = e.target.closest('[data-delete-eq]');
  if (eqDel) {
    e.stopPropagation();
    const id = Number(eqDel.dataset.deleteEq);
    const eq = equipmentData.find(i => i.id === id);
    showConfirm('Удалить тренажёр «' + (eq ? eq.brand + ' ' + eq.name : id) + '»?', async () => {
      await deleteEquipment(id);
      await loadEquipment();
      render();
      toast('Тренажёр удалён');
    });
    return;
  }

  // Exercise rename
  const exRename = e.target.closest('[data-rename-ex]');
  if (exRename) {
    e.stopPropagation();
    const ex = exerciseData.find(i => i.id === exRename.dataset.renameEx);
    if (!ex) return;
    detExercise = ex;
    showEditExerciseForm();
    return;
  }

  // Exercise delete
  const exDel = e.target.closest('[data-delete-ex]');
  if (exDel) {
    e.stopPropagation();
    const id = exDel.dataset.deleteEx;
    const ex = exerciseData.find(i => i.id === id);
    showConfirm('Удалить упражнение «' + (ex ? (ex.name_ru || ex.name_en) : id) + '»?', async () => {
      await deleteExercise(id);
      await loadExercises();
      render();
      toast('Упражнение удалено');
    });
    return;
  }

  // Equipment card click -> open detail panel
  if (currentTab === 'equipment') {
    const card = e.target.closest('.card[data-eq-id]');
    if (card) {
      openEquipmentDetail(Number(card.dataset.eqId));
      return;
    }
  }

  // Exercise card click -> open exercise detail panel
  if (currentTab === 'exercises') {
    const card = e.target.closest('.card[data-ex-id]');
    if (card) {
      openExerciseDetail(card.dataset.exId);
      return;
    }
  }

  // Exercise reorder within group (↑↓)
  if (currentTab === 'exercises') {
    const moveBtn = e.target.closest('[data-group-move]');
    if (moveBtn) {
      e.stopPropagation();
      await reorderExerciseInGroup(moveBtn.dataset.groupMove, parseInt(moveBtn.dataset.groupDir));
      return;
    }
  }

  // Exercise group rename button
  if (currentTab === 'exercises') {
    const renameBtn = e.target.closest('[data-rename-group]');
    if (renameBtn) {
      e.stopPropagation();
      showRenameGroupForm(renameBtn.dataset.renameGroup, renameBtn.dataset.renameMuscle);
      return;
    }
  }

  // Exercise group expand/collapse
  if (currentTab === 'exercises') {
    const header = e.target.closest('.muscle-group-header');
    if (header) {
      header.parentElement.classList.toggle('open');
      return;
    }
  }
});

// ===== EXERCISE DRAG & DROP =====
let _dragExId = null;

document.getElementById('content').addEventListener('dragstart', e => {
  const row = e.target.closest('[data-ex-id][draggable]');
  if (!row) return;
  _dragExId = row.dataset.exId;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => row.classList.add('ex-dragging'), 0);
});

document.getElementById('content').addEventListener('dragend', e => {
  const row = e.target.closest('[data-ex-id][draggable]');
  if (row) row.classList.remove('ex-dragging');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  _dragExId = null;
});

document.getElementById('content').addEventListener('dragover', e => {
  if (!_dragExId) return;
  const zone = e.target.closest('.muscle-drop-zone');
  if (!zone) return;
  e.preventDefault();
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  zone.classList.add('drag-over');
});

document.getElementById('content').addEventListener('dragleave', e => {
  const zone = e.target.closest('.muscle-drop-zone');
  if (zone && !zone.contains(e.relatedTarget)) zone.classList.remove('drag-over');
});

document.getElementById('content').addEventListener('drop', e => {
  const zone = e.target.closest('.muscle-drop-zone');
  if (!zone || !_dragExId) return;
  e.preventDefault();
  zone.classList.remove('drag-over');

  const exId = _dragExId;
  _dragExId = null;
  const ex = exerciseData.find(i => i.id === exId);
  if (!ex) return;

  const targetMuscle = zone.dataset.dropMuscle;
  const targetBase = zone.dataset.dropBase || null;

  if (targetBase) {
    // Dropping onto a group → suggest rename
    const curVariation = getVariationLabel(ex.name_ru || ex.name_en || '');
    const hasParen = (ex.name_ru || '').includes('(');
    const suggestedName = targetBase + ' (' + (hasParen ? curVariation : ex.name_ru || '') + ')';
    showExerciseMoveDialog(ex, targetBase, targetMuscle, suggestedName);
  } else {
    // Dropping onto muscle section title → just change primary_muscles, keep name
    const sameMuscle = (ex.primary_muscles || [])[0] === targetMuscle;
    if (sameMuscle) return;
    patchExercise(ex.id, { primary_muscles: [targetMuscle] })
      .then(() => { render(); toast('Перенесено в ' + (MUSCLE_RU[targetMuscle] || targetMuscle)); })
      .catch(err => toast('Ошибка: ' + err.message));
  }
});

function showExerciseMoveDialog(ex, targetBase, targetMuscle, suggestedName) {
  openModal('Перенести в группу', `
    <p style="color:#aaa;font-size:13px;margin-bottom:4px">Группа: <b style="color:#4a9eff">${esc(targetBase)}</b></p>
    <p style="color:#666;font-size:12px;margin-bottom:16px">Упражнение будет переименовано так, чтобы попасть в эту группу в пикере телефона</p>
    <div class="form-group">
      <label>Новое название (рус)</label>
      <input type="text" id="f-move-name-ru" value="${esc(suggestedName)}">
    </div>
    <div class="form-group">
      <label>Английское название (необязательно)</label>
      <input type="text" id="f-move-name-en" value="${esc(ex.name_en || '')}">
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" id="f-move-save">Сохранить</button>
    </div>
  `);
  document.getElementById('f-move-name-ru').focus();
  document.getElementById('f-move-name-ru').select();
  document.getElementById('f-move-save').onclick = async () => {
    const nameRu = document.getElementById('f-move-name-ru').value.trim();
    const nameEn = document.getElementById('f-move-name-en').value.trim();
    if (!nameRu) return toast('Введите название');
    try {
      const updates = { name_ru: nameRu, primary_muscles: [targetMuscle] };
      if (nameEn) updates.name_en = nameEn;
      await patchExercise(ex.id, updates);
      closeModal();
      render();
      toast('Готово');
    } catch (err) { toast('Ошибка: ' + err.message); }
  };
}

// Detail panel: back button
document.getElementById('det-back').addEventListener('click', closeEquipmentDetail);

// Detail panel: search
document.getElementById('det-search').addEventListener('input', e => renderDetSearchResults(e.target.value));

// Show all exercises in picker (not just machine exercises)
showAllExercises = true;

// Detail panel: clicks (toggle link, unlink, muscle group expand, exercise_type editor)
document.getElementById('det-overlay').addEventListener('click', async e => {
  // Exercise type: remove tag
  const etRemove = e.target.closest('[data-et-remove]');
  if (etRemove) {
    const typeToRemove = etRemove.dataset.etRemove;
    const types = (detEquipment.exercise_type || '').split(',').map(t => t.trim()).filter(Boolean);
    const newTypes = types.filter(t => t !== typeToRemove);
    etRemove.closest('.et-tag').style.opacity = '0.3';
    await updateExerciseType(newTypes.join(','));
    return;
  }

  // Exercise type: add button
  if (e.target.id === 'et-add-btn' || e.target.closest('#et-add-btn')) {
    const sel = document.getElementById('et-select');
    const newType = sel.value;
    if (!newType || !detEquipment) return;
    const types = (detEquipment.exercise_type || '').split(',').map(t => t.trim()).filter(Boolean);
    if (types.includes(newType)) return;
    types.push(newType);
    sel.disabled = true;
    await updateExerciseType(types.join(','));
    return;
  }

  // Toggle exercise link
  const toggle = e.target.closest('[data-toggle-ex]');
  if (toggle) { toggleExerciseLink(toggle.dataset.toggleEx); return; }

  // Unlink from linked list
  const unlink = e.target.closest('[data-unlink-ex]');
  if (unlink) { toggleExerciseLink(unlink.dataset.unlinkEx); return; }

  // Muscle group expand/collapse
  const header = e.target.closest('.muscle-group-header');
  if (header) {
    header.parentElement.classList.toggle('open');
    return;
  }
});

// Exercise detail panel: back button
document.getElementById('exdet-back').addEventListener('click', closeExerciseDetail);
document.getElementById('exdet-edit-btn').addEventListener('click', showEditExerciseForm);

// Exercise detail panel: click on linked equipment or image manager buttons
document.getElementById('exdet-overlay').addEventListener('click', async e => {
  const gotoEq = e.target.closest('[data-goto-eq]');
  if (gotoEq) {
    closeExerciseDetail();
    setTimeout(() => openEquipmentDetail(Number(gotoEq.dataset.gotoEq)), 350);
    return;
  }

  // Image manager: make main
  const mainBtn = e.target.closest('[data-img-main]');
  if (mainBtn && detExercise) {
    const idx = parseInt(mainBtn.dataset.imgMain);
    const imgs = [...(detExercise.images || [])];
    const [moved] = imgs.splice(idx, 1);
    imgs.unshift(moved);
    try {
      await patchExercise(detExercise.id, { images: imgs });
      renderExdetImageSection();
    } catch(err) { alert(err.message); }
    return;
  }

  // Image manager: move left/right
  const moveBtn = e.target.closest('[data-img-move]');
  if (moveBtn && detExercise) {
    const idx = parseInt(moveBtn.dataset.imgMove);
    const dir = parseInt(moveBtn.dataset.imgDir);
    const imgs = [...(detExercise.images || [])];
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= imgs.length) return;
    [imgs[idx], imgs[newIdx]] = [imgs[newIdx], imgs[idx]];
    try {
      await patchExercise(detExercise.id, { images: imgs });
      renderExdetImageSection();
    } catch(err) { alert(err.message); }
    return;
  }

  // Image manager: click upload card → trigger file input
  const uploadCard = e.target.closest('#exdet-upload-card');
  if (uploadCard && !e.target.closest('input')) {
    const inp = uploadCard.querySelector('input[type=file]');
    if (inp) inp.click();
  }
});

function renderExdetImageSection() {
  if (!detExercise) return;
  const imgs = detExercise.images || [];
  const content = document.getElementById('exdet-content');
  if (!content) return;
  const mgr = content.querySelector('.exdet-img-manager, .exdet-no-img');
  const newHtml = renderExdetImages(imgs);
  if (mgr) {
    mgr.outerHTML = newHtml;
  } else {
    content.insertAdjacentHTML('afterbegin', newHtml);
  }
  wireExdetUploadInput();
}

function wireExdetUploadInput() {
  const inp = document.getElementById('exdet-upload-input');
  if (!inp || inp._wired) return;
  inp._wired = true;
  inp.addEventListener('change', async () => {
    const files = [...inp.files].filter(f => f.type.startsWith('image/'));
    inp.value = '';
    if (!files.length || !detExercise) return;
    const card = document.getElementById('exdet-upload-card');
    if (card) card.style.opacity = '0.4';
    try {
      const newUrls = [];
      for (const file of files) {
        const url = await uploadExerciseImage(file, detExercise.id);
        newUrls.push(url);
      }
      const imgs = [...(detExercise.images || []), ...newUrls];
      await patchExercise(detExercise.id, { images: imgs });
      renderExdetImageSection();
      toast('Загружено: ' + newUrls.length + ' фото');
    } catch(err) {
      if (card) card.style.opacity = '';
      alert(err.message);
    }
  });
}

// Escape closes detail panels
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('exdet-overlay').classList.contains('visible')) {
      closeExerciseDetail();
    } else if (document.getElementById('det-overlay').classList.contains('visible')) {
      closeEquipmentDetail();
    }
  }
});

// ===== INIT =====
async function init() {
  document.getElementById('stats').textContent = 'Загрузка...';
  try {
    await Promise.all([loadProfiles(), loadGyms(), loadEquipment(), loadExercises()]);
    renderFilters();
    render();
    loadLinkCounts().then(() => render());
  } catch(e) {
    document.getElementById('content').innerHTML = '<div style="padding:40px;color:#f66;font-size:14px">Ошибка загрузки: ' + e.message + '</div>';
    console.error('init error:', e);
  }
}
init();

// ===== PUBLISH BUTTON =====
const GITHUB_REPO = 'Nasteenish/workout-tracker';
const WORKFLOW_ID = 'sync-exercises.yml';

function getGithubToken() {
  return localStorage.getItem('admin_gh_token') || '';
}

document.getElementById('publish-btn').addEventListener('click', async () => {
  let token = getGithubToken();
  if (!token) {
    token = prompt('Введи GitHub Personal Access Token (сохранится в браузере):');
    if (!token) return;
    localStorage.setItem('admin_gh_token', token.trim());
    token = token.trim();
  }
  const btn = document.getElementById('publish-btn');
  btn.disabled = true;
  btn.textContent = 'Публикую...';
  try {
    const r = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/${WORKFLOW_ID}/dispatches`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ ref: 'main' })
    });
    if (r.status === 204) {
      toast('Запущено! Через ~1 минуту изменения появятся на телефоне');
    } else if (r.status === 401) {
      localStorage.removeItem('admin_gh_token');
      toast('Токен неверный — введи снова');
    } else {
      toast('Ошибка ' + r.status);
    }
  } catch(e) {
    toast('Ошибка: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = 'Опубликовать';
});
</script>

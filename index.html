    <script>
        if ('serviceWorker' in navigator) {
            // Auto-reload when new SW takes control (ensures fresh code)
            var _swReloading = false;
            navigator.serviceWorker.addEventListener('controllerchange', function() {
                if (_swReloading) return;
                _swReloading = true;
                location.reload();
            });
            // One-time SW reset to clear corrupted state after rapid updates
            if (!localStorage.getItem('_swReset452')) {
                navigator.serviceWorker.getRegistrations().then(function(regs) {
                    return Promise.all(regs.map(function(r) { return r.unregister(); }));
                }).then(function() {
                    localStorage.setItem('_swReset452', '1');
                    return navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' });
                }).then(function(reg) { return reg.update(); });
            } else {
                navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
                    .then(function(reg) { return reg.update(); });
            }
        }
    </script>

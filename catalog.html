<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipment Catalog</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 16px; }
h1 { text-align: center; margin: 16px 0; font-size: 24px; }
.stats { text-align: center; margin-bottom: 20px; color: #888; font-size: 14px; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; position: sticky; top: 0; background: #0a0a0a; padding: 12px 0; z-index: 10; }
.filter-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 14px; transition: all 0.2s; }
.filter-btn.active { background: #4a9eff; color: #fff; border-color: #4a9eff; }
.filter-btn:hover { border-color: #4a9eff; }
.search { width: 100%; max-width: 400px; padding: 10px 16px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; font-size: 14px; margin: 0 auto 20px; display: block; }
.search:focus { outline: none; border-color: #4a9eff; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: transform 0.2s; }
.card:hover { transform: translateY(-2px); border-color: #444; }
.card-img { width: 100%; height: 180px; object-fit: contain; background: #fff; padding: 8px; }
.card-img.no-img { display: flex; align-items: center; justify-content: center; background: #222; color: #555; font-size: 40px; }
.card-body { padding: 12px; }
.card-brand { font-size: 11px; color: #4a9eff; text-transform: uppercase; letter-spacing: 1px; }
.card-name { font-size: 14px; font-weight: 600; margin: 4px 0; }
.card-model { font-size: 12px; color: #888; }
.card-meta { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #252525; color: #aaa; }
.tag.muscle { background: #1a2a1a; color: #6c6; }
.tag.type { background: #1a1a2a; color: #88f; }
.brand-section { margin-bottom: 8px; }
.brand-title { font-size: 18px; font-weight: 700; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #333; }
.count { color: #888; font-weight: 400; font-size: 14px; }
</style>
</head>
<body>

<h1>🏋️ Equipment Catalog</h1>
<div class="stats" id="stats"></div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-brand="all">Все</button>
  <button class="filter-btn" data-brand="gym80">gym80</button>
  <button class="filter-btn" data-brand="Precor">Precor</button>
  <button class="filter-btn" data-brand="Cybex">Cybex</button>
</div>

<input type="text" class="search" id="search" placeholder="Поиск по названию или модели...">

<div class="grid" id="grid"></div>

<script>
const SUPABASE_URL = 'https://mqyfdbfdeuwojgexhwpy.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xeWZkYmZkZXV3b2pnZXhod3B5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NzE1OTYsImV4cCI6MjA4NzQ0NzU5Nn0.5okpQM-UffmYatsVjbzjafsHhY3taCqhDYkiyEjiSvg';

let allItems = [];
let currentBrand = 'all';

async function loadData() {
  const res = await fetch(SUPABASE_URL + '/rest/v1/equipment_catalog?select=*&order=brand,name', {
    headers: { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY }
  });
  allItems = await res.json();
  document.getElementById('stats').textContent =
    'Всего: ' + allItems.length + ' | С фото: ' + allItems.filter(i => i.image_url).length;
  render();
}

function render() {
  const query = document.getElementById('search').value.toLowerCase();
  const filtered = allItems.filter(item => {
    if (currentBrand !== 'all' && item.brand !== currentBrand) return false;
    if (query && !item.name.toLowerCase().includes(query) &&
        !(item.model || '').toLowerCase().includes(query)) return false;
    return true;
  });

  const grid = document.getElementById('grid');
  grid.innerHTML = filtered.map(item => `
    <div class="card">
      ${item.image_url
        ? '<img class="card-img" src="' + item.image_url + '" alt="' + item.name + '" loading="lazy">'
        : '<div class="card-img no-img">📷</div>'}
      <div class="card-body">
        <div class="card-brand">${item.brand}</div>
        <div class="card-name">${item.name}</div>
        <div class="card-model">${item.model || '—'}</div>
        <div class="card-meta">
          <span class="tag muscle">${item.muscle_group || '—'}</span>
          <span class="tag type">${item.equipment_type || '—'}</span>
        </div>
      </div>
    </div>
  `).join('');
}

document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.matches('.filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentBrand = e.target.dataset.brand;
  render();
});

document.getElementById('search').addEventListener('input', render);

// Need RLS policy for anon select
loadData();
</script>
</body>
</html>

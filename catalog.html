<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 16px; }
h1 { text-align: center; margin: 16px 0; font-size: 24px; }
.stats { text-align: center; margin-bottom: 12px; color: #888; font-size: 14px; }

.tabs { display: flex; justify-content: center; gap: 0; margin-bottom: 16px; }
.tab { padding: 10px 24px; border: 1px solid #333; background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 15px; font-weight: 600; transition: all 0.2s; }
.tab:first-child { border-radius: 10px 0 0 10px; }
.tab:last-child { border-radius: 0 10px 10px 0; }
.tab.active { background: #4a9eff; color: #fff; border-color: #4a9eff; }

.filters { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; position: sticky; top: 0; background: #0a0a0a; padding: 12px 0; z-index: 10; }
.filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 13px; transition: all 0.2s; }
.filter-btn.active { background: #4a9eff; color: #fff; border-color: #4a9eff; }
.filter-btn:hover { border-color: #4a9eff; }
.search { width: 100%; max-width: 400px; padding: 10px 16px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; font-size: 14px; margin: 0 auto 20px; display: block; }
.search:focus { outline: none; border-color: #4a9eff; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: transform 0.2s; }
.card:hover { transform: translateY(-2px); border-color: #444; }
.card-img { width: 100%; height: 180px; object-fit: contain; background: #fff; padding: 8px; }
.card-img.no-img { display: flex; align-items: center; justify-content: center; background: #222; color: #555; font-size: 40px; }
.card-body { padding: 12px; }
.card-brand { font-size: 11px; color: #4a9eff; text-transform: uppercase; letter-spacing: 1px; }
.card-name { font-size: 14px; font-weight: 600; margin: 4px 0; }
.card-name-secondary { font-size: 12px; color: #999; margin-bottom: 4px; }
.card-model { font-size: 12px; color: #888; }
.card-meta { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #252525; color: #aaa; }
.tag.muscle { background: #1a2a1a; color: #6c6; }
.tag.type { background: #1a1a2a; color: #88f; }
.tag.cat { background: #2a1a1a; color: #c88; }
.tag.level { background: #2a2a1a; color: #cc8; }

/* Exercise card images - 2 images side by side */
.card-imgs { display: flex; gap: 2px; background: #fff; height: 180px; }
.card-imgs img { flex: 1; height: 100%; object-fit: contain; padding: 4px; }

.card { cursor: pointer; }

/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; padding: 16px; }
.modal-overlay.open { display: flex; }
.modal { background: #1a1a1a; border-radius: 16px; border: 1px solid #333; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; }
.modal-img { width: 100%; height: 240px; object-fit: contain; background: #fff; padding: 12px; border-radius: 16px 16px 0 0; }
.modal-img.no-img { display: flex; align-items: center; justify-content: center; background: #222; color: #555; font-size: 60px; }
.modal-imgs { display: flex; gap: 2px; background: #fff; height: 240px; border-radius: 16px 16px 0 0; }
.modal-imgs img { flex: 1; height: 100%; object-fit: contain; padding: 8px; }
.modal-body { padding: 20px; }
.modal-brand { font-size: 12px; color: #4a9eff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.modal-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.modal-subtitle { font-size: 14px; color: #999; margin-bottom: 12px; }
.modal-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #252525; font-size: 14px; }
.modal-row-label { color: #888; }
.modal-row-value { color: #e0e0e0; font-weight: 500; }
.modal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
.modal-close { position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; border-radius: 50%; border: none; background: rgba(0,0,0,0.5); color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.modal-overlay { position: fixed; }
.modal-wrapper { position: relative; max-width: 500px; width: 100%; }
</style>
</head>
<body>

<h1>🏋️ Каталог</h1>
<div class="stats" id="stats"></div>

<div class="tabs">
  <div class="tab active" data-tab="equipment">Тренажёры</div>
  <div class="tab" data-tab="exercises">Упражнения</div>
</div>

<div class="filters" id="filters"></div>
<div class="filters" id="filters2" style="display:none"></div>

<input type="text" class="search" id="search" placeholder="Поиск...">

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal">
  <div class="modal-wrapper">
    <button class="modal-close" id="modal-close">&times;</button>
    <div class="modal" id="modal-content"></div>
  </div>
</div>

<script>
const SB = 'https://mqyfdbfdeuwojgexhwpy.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xeWZkYmZkZXV3b2pnZXhod3B5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NzE1OTYsImV4cCI6MjA4NzQ0NzU5Nn0.5okpQM-UffmYatsVjbzjafsHhY3taCqhDYkiyEjiSvg';
const H = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY };

let equipmentData = [];
let exerciseData = [];
let currentTab = 'equipment';
let currentFilter = 'all';
let currentFilter2 = 'all';

async function loadEquipment() {
  const r = await fetch(SB + '/rest/v1/equipment_catalog?select=*&order=brand,name', { headers: H });
  equipmentData = await r.json();
}

async function loadExercises() {
  const r = await fetch(SB + '/rest/v1/exercises?select=*&order=name_ru', { headers: H });
  exerciseData = await r.json();
}

function getFilters() {
  if (currentTab === 'equipment') {
    const brands = [...new Set(equipmentData.map(i => i.brand))].sort();
    return [{ key: 'all', label: 'Все' }, ...brands.map(b => ({ key: b, label: b }))];
  } else {
    const muscles = [...new Set(exerciseData.flatMap(e => e.primary_muscles || []))].sort();
    return [{ key: 'all', label: 'Все' }, ...muscles.map(m => ({ key: m, label: m }))];
  }
}

function renderFilters() {
  const filters = getFilters();
  document.getElementById('filters').innerHTML = filters.map(f =>
    '<button class="filter-btn' + (currentFilter === f.key ? ' active' : '') + '" data-filter="' + f.key + '">' + f.label + '</button>'
  ).join('');

  const f2 = document.getElementById('filters2');
  if (currentTab === 'exercises') {
    const equips = [...new Set(exerciseData.map(e => e.equipment).filter(Boolean))].sort();
    f2.style.display = 'flex';
    f2.innerHTML = [{ key: 'all', label: 'Все' }, ...equips.map(e => ({ key: e, label: e }))].map(f =>
      '<button class="filter-btn' + (currentFilter2 === f.key ? ' active' : '') + '" data-filter2="' + f.key + '">' + f.label + '</button>'
    ).join('');
  } else {
    f2.style.display = 'none';
  }
}

function render() {
  const query = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');

  if (currentTab === 'equipment') {
    const filtered = equipmentData.filter(item => {
      if (currentFilter !== 'all' && item.brand !== currentFilter) return false;
      if (query && !item.name.toLowerCase().includes(query) && !(item.model || '').toLowerCase().includes(query)) return false;
      return true;
    });
    document.getElementById('stats').textContent = 'Тренажёры: ' + filtered.length + ' / ' + equipmentData.length;
    grid.innerHTML = filtered.map(item => `
      <div class="card">
        ${item.image_url
          ? '<img class="card-img" src="' + item.image_url + '" alt="' + item.name + '" loading="lazy">'
          : '<div class="card-img no-img">📷</div>'}
        <div class="card-body">
          <div class="card-brand">${item.brand}</div>
          <div class="card-name">${item.name}</div>
          <div class="card-model">${item.model || '—'}</div>
          <div class="card-meta">
            <span class="tag muscle">${item.muscle_group || '—'}</span>
            <span class="tag type">${item.equipment_type || '—'}</span>
          </div>
        </div>
      </div>
    `).join('');
  } else {
    const filtered = exerciseData.filter(item => {
      if (currentFilter !== 'all' && !(item.primary_muscles || []).includes(currentFilter)) return false;
      if (currentFilter2 !== 'all' && item.equipment !== currentFilter2) return false;
      if (query) {
        const q = query;
        const match = (item.name_ru || '').toLowerCase().includes(q) ||
                      (item.name_en || '').toLowerCase().includes(q) ||
                      (item.equipment || '').toLowerCase().includes(q);
        if (!match) return false;
      }
      return true;
    });
    document.getElementById('stats').textContent = 'Упражнения: ' + filtered.length + ' / ' + exerciseData.length;
    grid.innerHTML = filtered.map(item => {
      const imgs = item.images || [];
      let imgHtml;
      if (imgs.length >= 2) {
        imgHtml = '<div class="card-imgs"><img src="' + imgs[0] + '" loading="lazy"><img src="' + imgs[1] + '" loading="lazy"></div>';
      } else if (imgs.length === 1) {
        imgHtml = '<img class="card-img" src="' + imgs[0] + '" loading="lazy">';
      } else {
        imgHtml = '<div class="card-img no-img">🏋️</div>';
      }
      return `
        <div class="card">
          ${imgHtml}
          <div class="card-body">
            <div class="card-name">${item.name_ru || item.name_en}</div>
            <div class="card-name-secondary">${item.name_en}</div>
            <div class="card-meta">
              ${(item.primary_muscles || []).map(m => '<span class="tag muscle">' + m + '</span>').join('')}
              ${item.equipment ? '<span class="tag type">' + item.equipment + '</span>' : ''}
              ${item.category ? '<span class="tag cat">' + item.category + '</span>' : ''}
              ${item.level ? '<span class="tag level">' + item.level + '</span>' : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }
}

// Tabs
document.querySelector('.tabs').addEventListener('click', e => {
  if (!e.target.matches('.tab')) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  currentTab = e.target.dataset.tab;
  currentFilter = 'all';
  currentFilter2 = 'all';
  renderFilters();
  render();
});

// Filters
document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.matches('.filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.filter;
  render();
});

// Filters2 (equipment)
document.getElementById('filters2').addEventListener('click', e => {
  if (!e.target.matches('.filter-btn')) return;
  document.getElementById('filters2').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter2 = e.target.dataset.filter2;
  render();
});

// Search
document.getElementById('search').addEventListener('input', render);

// Modal
const modalOverlay = document.getElementById('modal');
const modalContent = document.getElementById('modal-content');

document.getElementById('modal-close').addEventListener('click', () => modalOverlay.classList.remove('open'));
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) modalOverlay.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') modalOverlay.classList.remove('open'); });

function showEquipmentModal(item) {
  const imgHtml = item.image_url
    ? `<img class="modal-img" src="${item.image_url}" alt="${item.name}">`
    : `<div class="modal-img no-img">📷</div>`;
  modalContent.innerHTML = `
    ${imgHtml}
    <div class="modal-body">
      <div class="modal-brand">${item.brand}</div>
      <div class="modal-title">${item.name}</div>
      ${item.model ? `<div class="modal-subtitle">${item.model}</div>` : ''}
      <div class="modal-row"><span class="modal-row-label">Группа мышц</span><span class="modal-row-value">${item.muscle_group || '—'}</span></div>
      <div class="modal-row"><span class="modal-row-label">Тип</span><span class="modal-row-value">${item.equipment_type || '—'}</span></div>
      ${item.category ? `<div class="modal-row"><span class="modal-row-label">Категория</span><span class="modal-row-value">${item.category}</span></div>` : ''}
      ${item.description ? `<div style="margin-top:12px;color:#bbb;font-size:14px;line-height:1.5">${item.description}</div>` : ''}
    </div>
  `;
  modalOverlay.classList.add('open');
}

function showExerciseModal(item) {
  const imgs = item.images || [];
  let imgHtml;
  if (imgs.length >= 2) {
    imgHtml = `<div class="modal-imgs"><img src="${imgs[0]}"><img src="${imgs[1]}"></div>`;
  } else if (imgs.length === 1) {
    imgHtml = `<img class="modal-img" src="${imgs[0]}">`;
  } else {
    imgHtml = `<div class="modal-img no-img">🏋️</div>`;
  }
  const muscles = (item.primary_muscles || []).join(', ') || '—';
  const secondary = (item.secondary_muscles || []).join(', ');
  modalContent.innerHTML = `
    ${imgHtml}
    <div class="modal-body">
      <div class="modal-title">${item.name_ru || item.name_en}</div>
      ${item.name_en && item.name_ru ? `<div class="modal-subtitle">${item.name_en}</div>` : ''}
      <div class="modal-row"><span class="modal-row-label">Основные мышцы</span><span class="modal-row-value">${muscles}</span></div>
      ${secondary ? `<div class="modal-row"><span class="modal-row-label">Доп. мышцы</span><span class="modal-row-value">${secondary}</span></div>` : ''}
      ${item.equipment ? `<div class="modal-row"><span class="modal-row-label">Оборудование</span><span class="modal-row-value">${item.equipment}</span></div>` : ''}
      ${item.category ? `<div class="modal-row"><span class="modal-row-label">Категория</span><span class="modal-row-value">${item.category}</span></div>` : ''}
      ${item.level ? `<div class="modal-row"><span class="modal-row-label">Уровень</span><span class="modal-row-value">${item.level}</span></div>` : ''}
      ${item.mechanic ? `<div class="modal-row"><span class="modal-row-label">Механика</span><span class="modal-row-value">${item.mechanic}</span></div>` : ''}
      ${item.force ? `<div class="modal-row"><span class="modal-row-label">Сила</span><span class="modal-row-value">${item.force}</span></div>` : ''}
      ${item.instructions ? `<div style="margin-top:12px;color:#bbb;font-size:14px;line-height:1.5">${Array.isArray(item.instructions) ? item.instructions.map((s,i) => `<div style="margin-bottom:8px">${i+1}. ${s}</div>`).join('') : item.instructions}</div>` : ''}
    </div>
  `;
  modalOverlay.classList.add('open');
}

// Card clicks
document.getElementById('grid').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const idx = [...document.querySelectorAll('.card')].indexOf(card);
  if (currentTab === 'equipment') {
    const query = document.getElementById('search').value.toLowerCase();
    const filtered = equipmentData.filter(item => {
      if (currentFilter !== 'all' && item.brand !== currentFilter) return false;
      if (query && !item.name.toLowerCase().includes(query) && !(item.model || '').toLowerCase().includes(query)) return false;
      return true;
    });
    if (filtered[idx]) showEquipmentModal(filtered[idx]);
  } else {
    const query = document.getElementById('search').value.toLowerCase();
    const filtered = exerciseData.filter(item => {
      if (currentFilter !== 'all' && !(item.primary_muscles || []).includes(currentFilter)) return false;
      if (currentFilter2 !== 'all' && item.equipment !== currentFilter2) return false;
      if (query) {
        const match = (item.name_ru || '').toLowerCase().includes(query) ||
                      (item.name_en || '').toLowerCase().includes(query) ||
                      (item.equipment || '').toLowerCase().includes(query);
        if (!match) return false;
      }
      return true;
    });
    if (filtered[idx]) showExerciseModal(filtered[idx]);
  }
});

// Init
Promise.all([loadEquipment(), loadExercises()]).then(() => {
  renderFilters();
  render();
});
</script>
</body>
</html>
